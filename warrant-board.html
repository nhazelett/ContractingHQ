      { name: "Apply", hint: "Where does it bite?", model: "Most often at year-end, when offices want to obligate annual funds for things that will not be needed until next year. Severable services have a limited exception that allows up to 12 months of performance crossing fiscal years if the contract is funded with annual appropriations available at the time of award." },
    ],
  },
  {
    topic: "Color of Money",
    q: "What are the major appropriation categories DoD uses, and what do they cover?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "DoD Financial Management Regulation, 7000.14-R." },
      { name: "Rule", hint: "What are the major colors?", model: "Operations and Maintenance funds the day-to-day operating expenses and is annual money. Procurement funds the purchase of investment items and is generally three-year money. Research, Development, Test and Evaluation funds R&D and is generally two-year money. Military Construction funds construction projects and is generally five-year money. Military Personnel funds pay and benefits and is annual." },
      { name: "Apply", hint: "Why does this matter?", model: "Each color has rules about what it can be used for and how long it is available to obligate. Putting the wrong color on the wrong action is a Purpose Statute violation, which is one of the bigger fiscal law mistakes a CO can make." },
    ],
  },
  {
    topic: "PCO, ACO, TCO",
    q: "What are the differences between a PCO, an ACO, and a TCO?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 2.101 and FAR Part 42." },
      { name: "Rule", hint: "What does each do?", model: "The Procuring Contracting Officer is the CO who awards the contract and is responsible for actions before award and any post-award functions retained. The Administrative Contracting Officer handles contract administration after award, including modifications, payments, and day-to-day issues. The Termination Contracting Officer handles termination actions, including settlement of claims and disposition of property." },
      { name: "Apply", hint: "How does this work in practice?", model: "On large contracts, especially those administered by DCMA, the PCO awards and then the ACO takes over administration. The TCO comes in only if the contract is being terminated. On smaller actions, one CO often wears all three hats." },
    ],
  },
  {
    topic: "Contracting Officer's Representative",
    q: "What is a COR and what can they do?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 1.602-2(d) and DFARS 201.602-2." },
      { name: "Rule", hint: "What is the role?", model: "A COR is a designated technical representative who assists the contracting officer with the administration of a contract, within the limits of a written designation. The COR can monitor performance, inspect deliverables, and report problems. The COR cannot make any commitment that would change the price, schedule, or terms of the contract." },
      { name: "Apply", hint: "Why does this matter?", model: "The COR is the CO's eyes and ears on a contract, and most of the day-to-day technical contact with the contractor goes through them. The line they cannot cross is the line between monitoring and directing. A COR who tells a contractor to do something new has just teed up an unauthorized commitment." },
    ],
  },
  {
    topic: "GFP",
    q: "What is government furnished property and what are the rules?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Part 45." },
      { name: "Rule", hint: "What is it?", model: "Government furnished property is property in the possession of, or directly acquired by, the government and subsequently furnished to the contractor for performance of a contract. The contractor is responsible for using, controlling, and accounting for it under the Government Property clause at FAR 52.245-1." },
      { name: "Apply", hint: "When and why do you furnish it?", model: "GFP is appropriate when it is in the government's best interest to furnish property the contractor needs, usually because the government already has it, can get it cheaper, or because the property is unique. The decision is documented and the contract has to identify the property and any conditions of use." },
    ],
  },
  {
    topic: "Novation",
    q: "What is a novation agreement?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 42.12." },
      { name: "Rule", hint: "What is it?", model: "A novation agreement recognizes a third party as the successor in interest to a government contract when contractor assets are transferred. It is a tripartite agreement among the government, the original contractor, and the successor. Without a novation, the government has no contractual relationship with the new entity." },
      { name: "Apply", hint: "When does it come up?", model: "Mergers, acquisitions, and sales of business units. The government does not have to recognize the transfer, but typically does when it is in the government's interest. The responsible CO is the one with the largest unsettled dollar balance of contracts being transferred." },
    ],
  },
  {
    topic: "Change of Name Agreement",
    q: "What is the difference between a change of name agreement and a novation?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 42.1205 for change of name, FAR 42.1204 for novation." },
      { name: "Rule", hint: "What is each?", model: "A change of name agreement is used when only the contractor's name has changed and there is no transfer of assets. A novation is used when there is an actual transfer of assets to a successor in interest. Both are processed by the responsible CO." },
      { name: "Apply", hint: "Why does the distinction matter?", model: "Same-entity name change is administrative. Asset transfer is substantive. Treating one like the other can leave the government with no enforceable contract against the right party. The legal entity, not just the letterhead, is what matters." },
    ],
  },
  {
    topic: "Contract Closeout",
    q: "What is the contract closeout process, and what are the time standards?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 4.804." },
      { name: "Rule", hint: "What does it require?", model: "Files for contracts using simplified acquisition procedures should be considered closed when the CO receives evidence of receipt of property and final payment, unless otherwise specified. Firm fixed price contracts other than simplified should be closed within 6 months of physical completion. Contracts requiring settlement of indirect cost rates should be closed within 36 months. Other contracts should be closed within 20 months." },
      { name: "Apply", hint: "What does closeout actually involve?", model: "Verifying physical and administrative completion, reconciling funds, deobligating any remaining balance, ensuring final payment, completing the file, and disposing of records per the retention schedule. CPARS final evaluations are part of administrative closeout for applicable contracts." },
    ],
  },
  {
    topic: "Synopsis",
    q: "What is a synopsis and where does it get posted?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 5.2." },
      { name: "Rule", hint: "What is it?", model: "A synopsis is a public notice of a proposed contract action, posted on the governmentwide point of entry, currently SAM.gov. It gives industry advance notice of the upcoming opportunity. Synopsis is generally required for actions expected to exceed $25,000 unless one of the FAR 5.202 exceptions applies." },
      { name: "Apply", hint: "Why do we synopsize?", model: "To give the marketplace a fair chance to compete and to surface vendors the buying activity may not know about. A weak or skipped synopsis is a recurring protest ground because it can be argued that the agency limited competition." },
    ],
  },
  {
    topic: "Buy American Act",
    q: "What is the Buy American Act and when does it apply?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "41 U.S.C. Chapter 83 and FAR Part 25." },
      { name: "Rule", hint: "What does it require?", model: "The Buy American Act establishes a preference for domestic end products in U.S. acquisitions. An end product is domestic if it is manufactured in the United States and the cost of its components mined, produced, or manufactured in the United States exceeds a percentage threshold set by FAR Part 25, with that threshold increasing under recent updates. There are exceptions for nonavailability, unreasonable cost, and public interest." },
      { name: "Apply", hint: "Where does it bite?", model: "Anytime you are buying supplies for use in the United States and there is a foreign source. The Trade Agreements Act can override BAA for designated countries above its threshold. The Berry Amendment is a tougher rule for DoD purchases of certain food, clothing, and textiles." },
    ],
  },
  {
    topic: "Trade Agreements Act",
    q: "What is the Trade Agreements Act and how does it interact with the Buy American Act?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "19 U.S.C. Chapter 13 and FAR Subpart 25.4." },
      { name: "Rule", hint: "What does it do?", model: "The Trade Agreements Act waives the Buy American Act for products from designated countries when the acquisition is at or above the dollar threshold set in FAR 25.402. Above the threshold, only U.S.-made or designated country end products may be acquired, with limited exceptions." },
      { name: "Apply", hint: "How do they interact?", model: "Below the TAA threshold, BAA applies and a domestic preference is in effect. At or above the threshold, TAA applies and the field opens up to designated countries on equal footing with U.S. products. The CO has to know which threshold the acquisition crosses." },
    ],
  },
  {
    topic: "Berry Amendment",
    q: "What is the Berry Amendment?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "10 U.S.C. 4862 and DFARS 225.7002." },
      { name: "Rule", hint: "What does it require?", model: "DoD funds may not be used to procure certain items unless they are wholly grown, reprocessed, reused, or produced in the United States. Covered items include food, clothing, tents, tarpaulins, certain hand or measuring tools, and specialty metals. There are limited exceptions, mostly for nonavailability and small purchases." },
      { name: "Apply", hint: "Why does it matter?", model: "Berry is stricter than the Buy American Act for the items it covers, with no general designated-country exception. If you are buying a covered item with DoD funds, the contractor's product has to meet the Berry requirements or you need a documented exception." },
    ],
  },
  {
    topic: "Service Contract Labor Standards",
    q: "What is the Service Contract Labor Standards statute and when does it apply?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "41 U.S.C. Chapter 67, formerly the Service Contract Act, with implementation at FAR Subpart 22.10." },
      { name: "Rule", hint: "What does it require?", model: "It requires contractors and subcontractors performing services on prime contracts in excess of $2,500 to pay service employees at least the wages and fringe benefits established in a Department of Labor wage determination, or the rates contained in a predecessor contractor's collective bargaining agreement." },
      { name: "Apply", hint: "How does it show up?", model: "On covered service contracts, the CO requests a wage determination from DOL, includes it in the solicitation, and incorporates the SCLS clause. The contractor has to pay at least the WD rates and post the WD at the worksite. Compliance is enforced by DOL." },
    ],
  },
  {
    topic: "Davis Bacon Act",
    q: "What is the Davis Bacon Act?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "40 U.S.C. Chapter 31, with implementation at FAR Subpart 22.4." },
      { name: "Rule", hint: "What does it require?", model: "On federal construction contracts in excess of $2,000 for construction, alteration, or repair of public buildings or public works, contractors must pay laborers and mechanics no less than the prevailing wages and fringe benefits established by the Department of Labor for the locality." },
      { name: "Apply", hint: "Where does it apply?", model: "Construction contracts. The CO requests a wage determination from DOL, includes it in the solicitation, and incorporates the Davis Bacon clauses. SCLS is the parallel rule for service contracts; Davis Bacon is for construction." },
    ],
  },
  {
    topic: "BPA",
    q: "What is a Blanket Purchase Agreement?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 13.303 for simplified BPAs and FAR Subpart 8.405-3 for FSS BPAs." },
      { name: "Rule", hint: "What is it?", model: "A BPA is a simplified method of filling anticipated repetitive needs for supplies or services by establishing charge accounts with qualified sources. It is not a contract, but a framework. Each call against the BPA creates the actual obligation." },
      { name: "Apply", hint: "When does it fit?", model: "When the buying activity has recurring needs from the same source or sources and wants to streamline the order process. Common for small recurring buys at the office level. FSS BPAs piggyback on existing GSA Schedule contracts and let agencies set up customized terms." },
    ],
  },
  {
    topic: "IDIQ Contracts",
    q: "What is an IDIQ contract and how do orders work against it?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 16.5, indefinite-delivery contracts." },
      { name: "Rule", hint: "What is it?", model: "An indefinite-delivery indefinite-quantity contract provides for an indefinite quantity of supplies or services within stated limits during a fixed period. The government places orders for individual requirements. The contract specifies a guaranteed minimum the government will order and a maximum it can order. Orders are issued under the contract's ordering procedures." },
      { name: "Apply", hint: "What about multiple awards?", model: "When practicable, IDIQ contracts are awarded to multiple sources, and orders are placed using fair opportunity procedures under FAR 16.505(b). Each awardee must be given a fair opportunity to be considered for each order above the micro-purchase threshold, with limited exceptions." },
    ],
  },
  {
    topic: "Fair Opportunity",
    q: "What is the fair opportunity rule?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 16.505(b)." },
      { name: "Rule", hint: "What does it require?", model: "Each awardee under a multiple award IDIQ contract must be given a fair opportunity to be considered for each order exceeding the micro-purchase threshold, unless one of the listed exceptions applies. The exceptions include urgency, sole source for a follow-on, minimum guarantee, and a unique or innovative approach." },
      { name: "Apply", hint: "What does 'fair opportunity' look like?", model: "The CO sets the procedures, and they have to give each awardee a real chance. That can be a streamlined RFQ, an oral proposal request, or a notice with a written response window. If the CO uses an exception, the basis has to be documented." },
    ],
  },
  {
    topic: "Options Exercise",
    q: "Walk us through the steps to properly exercise a contract option.",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 17.207." },
      { name: "Rule", hint: "What are the steps?", model: "Provide written notice within the period required by the contract. Make a determination, in writing, that funds are available, that the requirement covered by the option fulfills an existing government need, and that exercise is the most advantageous method of fulfilling the need, price and other factors considered. Confirm the contractor is not on the SAM exclusions list, that past performance has been considered, and that the option was synopsized as required or is exempt." },
      { name: "Apply", hint: "What is the most common mistake?", model: "Letting the option exercise window expire. The contract sets a specific notice period, and missing it means the option dies and the work has to be resoliciated. The other common mistake is failing to document the 'most advantageous' analysis with anything more than a checkbox." },
    ],
  },
  {
    topic: "Contract Disputes Act Claim",
    q: "What is a claim under the Contract Disputes Act and what is the appeal path?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "41 U.S.C. Chapter 71 and FAR Subpart 33.2." },
      { name: "Rule", hint: "What is a claim?", model: "A claim under the CDA is a written demand or assertion by one of the contracting parties seeking, as a matter of right, the payment of money in a sum certain, the adjustment or interpretation of contract terms, or other relief arising under or relating to the contract. Contractor claims over $100,000 must be certified." },
      { name: "Apply", hint: "What is the path after a final decision?", model: "The CO issues a final decision. The contractor can appeal to the agency board of contract appeals within 90 days, or file suit in the Court of Federal Claims within 12 months. Either way, the dispute moves out of the CO's hands once the final decision is appealed." },
    ],
  },
  {
    topic: "Termination for Convenience",
    q: "What is termination for convenience and how does it differ for a commercial item contract?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "For non-commercial contracts, FAR Part 49 with the clauses at FAR 52.249. For commercial products and commercial services, FAR 12.403 and the commercial terminations language inside FAR 52.212-4(l)." },
      { name: "Rule", hint: "What is the non-commercial rule?", model: "Under Part 49, the government may terminate in whole or in part when it is in the government's interest. The contractor submits a settlement proposal using one of the inventory or total-cost bases in Part 49, and is entitled to costs incurred, settlement expenses, and a reasonable profit on work performed. Part 49 runs a prescribed settlement process with defined timelines and records." },
      { name: "Apply", hint: "How does commercial T4C under 52.212-4(l) differ?", model: "Commercial T4C is governed by the single paragraph 52.212-4(l), not by Part 49. The government pays a percentage of the contract price reflecting the percentage of work performed prior to termination, plus reasonable charges the contractor can demonstrate resulted from the termination using its standard record-keeping practices. There is no Part 49 settlement proposal, no inventory schedules, and no Part 31 cost-principle walk. The contractor does not have to follow government cost accounting to be paid. The CO does not run a Part 49 settlement; the CO negotiates within the 52.212-4(l) framework. Treating a commercial T4C like a Part 49 termination is a common mistake and drives disputes." },
    ],
  },
  {
    topic: "Limitation of Cost vs Limitation of Funds",
    q: "What is the difference between the Limitation of Cost clause and the Limitation of Funds clause?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 52.232-20 (Limitation of Cost) and 52.232-22 (Limitation of Funds)." },
      { name: "Rule", hint: "What is each for?", model: "Limitation of Cost is used in fully funded cost-reimbursement contracts. The cap is the total estimated cost. Limitation of Funds is used in incrementally funded cost-reimbursement contracts. The cap is the total amount of funds currently allotted to the contract. Both require the contractor to give written notice when expected costs in the next 60 days, plus already incurred costs, will reach 75 percent of the cap." },
      { name: "Apply", hint: "Why does the distinction matter?", model: "Funding strategy. If the contract is fully funded at award, you use LOC. If you are obligating funds in increments over time, you use LOF. Mixing them up creates a disconnect between what the contractor reports against and what the file actually obligates." },
    ],
  },
  {
    topic: "GAO Bid Protest",
    q: "A protest is filed at GAO after award. What are your immediate steps?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 33.104 and the agency supplements that implement it." },
      { name: "Rule", hint: "What is the rule?", model: "Upon notice of a GAO protest, the agency must suspend performance pending resolution of the protest unless the head of the contracting activity overrides the stay based on urgent and compelling circumstances or determining that performance is in the best interests of the government. The agency has to file a report with GAO within 30 days." },
      { name: "Apply", hint: "What do you actually do first?", model: "Notify legal and the awardee. Decide whether to suspend performance or pursue an override determination. Coordinate with the program office on impacts. Pull the file together for the agency report. The clock is the protest clock, not the program clock, so things move fast." },
      { name: "Decide", hint: "Suspend or override?", model: "Default is to suspend. An override has to be justified in writing at the HCA level and is subject to challenge in its own right. Most actions get suspended and worked through the protest process." },
      { name: "Limit", hint: "Who is in the room?", model: "Legal owns the protest response. The CO supports with the file and any factual context. The HCA decides on overrides. The program office is informed of impacts." },
    ],
  },
  {
    topic: "Performance-Based Acquisition",
    q: "What is performance-based acquisition and what are its required elements?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 37.102 and FAR Subpart 37.6." },
      { name: "Rule", hint: "What is it?", model: "Performance-based acquisition is the preferred method for acquiring services. It structures the requirement around the results to be achieved rather than the manner of performance. Required elements are a Performance Work Statement or Statement of Objectives, measurable performance standards with a quality assurance surveillance plan, and performance incentives where appropriate." },
      { name: "Apply", hint: "Why is this preferred?", model: "It puts the contractor in the position of figuring out how to meet the result, which generally produces better outcomes than dictating method. It also gives the government a clear basis for judging whether the contractor performed, because the standards are written down up front." },
    ],
  },
  {
    topic: "Excessive Pass-Through Costs",
    q: "What are excessive pass-through costs?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.408(n), FAR 31.203(i), and the clauses at FAR 52.215-22 and 52.215-23." },
      { name: "Rule", hint: "What is the rule?", model: "An excessive pass-through charge is a charge by a contractor or subcontractor for indirect costs or profit on work performed by a lower-tier subcontractor when the contractor adds no or negligible value to the work. Such charges are unallowable. The pass-through clause is required on contracts above the certified cost or pricing data threshold for non-FFP and non-commercial actions." },
      { name: "Apply", hint: "Why does this matter?", model: "It prevents primes from collecting fee on work they did nothing to support. The CO has to look at the contractor's role on subcontracted work and challenge any indirect costs or fee that do not correspond to actual value added in managing the sub." },
    ],
  },
  {
    topic: "Tradeoff Source Selection",
    q: "What is a tradeoff source selection and when do you use it?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.101-1." },
      { name: "Rule", hint: "What is it?", model: "A tradeoff process permits tradeoffs among cost or price and non-cost factors and allows the government to accept other than the lowest priced proposal or other than the highest technically rated proposal. The perceived benefits of the higher priced proposal must merit the additional cost, and the rationale for tradeoffs must be documented." },
      { name: "Apply", hint: "When does it fit?", model: "When the requirement is not a commodity and the technical approach matters. When the agency is willing to pay more for a stronger proposal. When the source selection authority needs the discretion to weigh factors against each other rather than mechanically picking the cheapest." },
    ],
  },
  {
    topic: "LPTA Source Selection",
    q: "What is LPTA and when is it the right tool?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.101-2." },
      { name: "Rule", hint: "What is it?", model: "Lowest price technically acceptable source selection is appropriate when best value is expected to result from selection of the technically acceptable proposal with the lowest evaluated price. Technical factors are evaluated only on an acceptable or unacceptable basis. Tradeoffs are not permitted." },
      { name: "Apply", hint: "When does it fit?", model: "When the requirement is well defined, the risk of unsuccessful performance is minimal, technical capabilities can be measured against a clear acceptable threshold, and there is no value in paying more for better. The classic case is straightforward commodity-like work where one acceptable solution is as good as another." },
    ],
  },
  {
    topic: "Synopsis Exception for Urgency",
    q: "When can you use the urgency exception to skip a synopsis?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 5.202(a)(2)." },
      { name: "Rule", hint: "What does it require?", model: "Synopsis is not required when the contract action is supported by a justification and approval for unusual and compelling urgency under FAR 6.302-2 and the government would be seriously injured if the agency complied with the time periods established by FAR 5.203." },
      { name: "Apply", hint: "What is the bar?", model: "It is a high bar. 'Inconvenient' or 'tight schedule' is not enough. The harm has to be serious and tied to the time the synopsis would consume, and there has to be a 6.302-2 J&A in the file. The exception cannot be self-induced by poor planning." },
    ],
  },
  {
    topic: "Warranty Basics",
    q: "What does a warranty provide in a government contract?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 46.7." },
      { name: "Rule", hint: "What is the purpose?", model: "A warranty delineates the rights and obligations of the contractor and the government for defective items or services and fosters quality performance. It generally provides a contractual right for correction of defects after acceptance, for a stated period of time or use, notwithstanding any other contract provisions on acceptance." },
      { name: "Apply", hint: "When do you include one?", model: "When the value of the warranty justifies the cost. The CO weighs the nature and use of the supplies or services, the cost, the administration burden, the trade practice, and the reduced requirements for inspection and quality assurance. Warranties are generally not used in cost-reimbursement contracts, with limited exceptions." },
    ],
  },
  {
    topic: "Definitization Schedule for UCAs",
    q: "What is the definitization schedule for an undefinitized contract action under DFARS?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "DFARS 217.7404." },
      { name: "Rule", hint: "What is the rule?", model: "A UCA must be definitized within 180 days after issuance, including any options the CO is going to exercise, or before more than 50 percent of the not-to-exceed price has been obligated, whichever is earlier. The HCA may extend the period if necessary, with documentation. The contractor has to submit a qualifying proposal by a specific date in the action." },
      { name: "Apply", hint: "Why is this strict?", model: "Because the contractor has the leverage during the undefinitized period. They have started work, the government depends on them, and the price is not yet locked. The shorter the undefinitized window, the smaller the leverage gap. Definitization profit also has to reflect the reduced risk during undefinitized performance." },
    ],
  },
  {
    topic: "Inherently Governmental Functions",
    q: "What are inherently governmental functions?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 7.5 and OFPP Policy Letter 11-01." },
      { name: "Rule", hint: "What are they?", model: "Inherently governmental functions are those so intimately related to the public interest that they must be performed by federal employees. They include functions involving the exercise of sovereign government authority or the establishment of procedures and processes related to the oversight of monetary transactions. Examples include command of military forces, conduct of diplomatic relations, and binding the government to a contract." },
      { name: "Apply", hint: "Why does this matter?", model: "Because contractors cannot perform them. A statement of work that calls on a contractor to make a final decision binding on the government, or to exercise discretion on behalf of the government, has crossed the line. The CO has to scrub the SOW for these before award." },
    ],
  },
  {
    topic: "Contractor Responsibility vs Responsiveness",
    q: "What is the difference between responsibility and responsiveness?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Part 9 for responsibility and FAR Part 14 for responsiveness." },
      { name: "Rule", hint: "What is each?", model: "Responsiveness is whether a bid, in sealed bidding, conforms in all material respects to the invitation for bids. It is determined at bid opening by looking at the bid itself. Responsibility is whether the offeror has the capability and integrity to perform, and is determined by the CO before award based on the standards in FAR 9.104." },
      { name: "Apply", hint: "Why does the distinction matter?", model: "Responsiveness is bid-side: did the bid say what it had to say. Responsibility is offeror-side: can this company actually do the work. A nonresponsive bid is rejected. A nonresponsible offeror cannot receive award. The two are evaluated at different times under different standards." },
    ],
  },
  // ---- FAR Part 5 ----
  {
    topic: "Public Display Period for Synopsis",
    q: "How long does a synopsis have to sit before a solicitation can issue?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 5.203." },
      { name: "Rule", hint: "What are the waiting periods?", model: "The CO must wait at least 15 days after publishing the synopsis before issuing the solicitation, and the solicitation response time must be at least 30 days from the date the solicitation is issued for most acquisitions over the SAT. For commercial items under Part 12, the CO may combine the synopsis and solicitation and set a reasonable response time, typically not less than 15 days but adjustable based on circumstances." },
      { name: "Apply", hint: "Why enforce the wait?", model: "Because the wait is what gives the public fair notice and makes the competition real. Skipping it collapses competition and invites protest. The CO builds the schedule around the wait, not the other way around." },
    ],
  },
  {
    topic: "Presolicitation Notice",
    q: "What is a presolicitation notice and when is it used?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 5.204." },
      { name: "Rule", hint: "What is it?", model: "A presolicitation notice is a notice published on the governmentwide point of entry that describes an upcoming acquisition and invites potential offerors to submit information about their capabilities. It is used when the CO wants to gauge industry interest before issuing a formal solicitation, most commonly in negotiated procurements." },
      { name: "Apply", hint: "Why use it?", model: "Because it lets the CO shape the acquisition with real market input. For small business set-aside decisions and for scoping complex requirements, a presolicitation notice is how the CO finds out who is actually out there before locking the RFP." },
    ],
  },
  {
    topic: "SAM.gov Contract Opportunities",
    q: "What is the governmentwide point of entry?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 2.101 and 5.101." },
      { name: "Rule", hint: "What is it?", model: "The governmentwide point of entry, or GPE, is the single point where federal business opportunities are published for public access. It is currently SAM.gov Contract Opportunities, which replaced the legacy FedBizOpps." },
      { name: "Apply", hint: "Why does this matter?", model: "Because synopses, solicitations, amendments, and award notices that FAR requires to be publicized must be posted there. Posting to a local site or service portal does not satisfy the FAR publicizing requirement." },
    ],
  },
  // ---- FAR Part 6 ----
  {
    topic: "Competition Advocate",
    q: "Who is the Competition Advocate and what do they do?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 6.501 and 10 U.S.C. 2318." },
      { name: "Rule", hint: "What is the role?", model: "Every agency designates a Competition Advocate whose job is to challenge barriers to full and open competition and promote competition in the agency's acquisitions. They review J&As, identify opportunities to increase competition, and report annually on competition outcomes." },
      { name: "Apply", hint: "Why does the CO care?", model: "Because at certain dollar thresholds the Competition Advocate has to approve the J&A before the CO can proceed noncompetitively. They are a check on reflexive sole-source thinking." },
    ],
  },
  {
    topic: "Urgent and Compelling J&A Posting",
    q: "Under the urgent and compelling exception, when can the J&A be published after award?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 6.302-2 and 6.305." },
      { name: "Rule", hint: "What is the rule?", model: "Under the unusual and compelling urgency exception, the J&A may be approved and posted within 30 days after contract award rather than before solicitation. This is the only 6.302 exception that permits post-award J&A posting. The solicitation itself can also be limited in time to match the urgency." },
      { name: "Apply", hint: "Why the carve-out?", model: "Because urgency is the whole point of the exception. Requiring pre-award synopsis and J&A approval would defeat it. But it is not a pass on documentation. The CO still has to assemble and publish the J&A, just on a compressed timeline." },
    ],
  },
  // ---- FAR Part 7 ----
  {
    topic: "Written Acquisition Plan",
    q: "When is a written acquisition plan required?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 7.103 and agency supplements set the thresholds." },
      { name: "Rule", hint: "What is the rule?", model: "FAR 7.103 requires agencies to perform acquisition planning for all acquisitions and to prescribe when written plans are required. DFARS and agency supplements set specific dollar thresholds, and individual agencies may set lower thresholds. For DoD, written plans are generally required for acquisitions above certain dollar and complexity thresholds set in the DFARS PGI." },
      { name: "Apply", hint: "Why does planning matter?", model: "Because acquisition planning is where the strategy gets decided: contract type, competition approach, small business strategy, schedule. The plan forces those calls to be made and documented before the solicitation, not after." },
    ],
  },
  {
    topic: "Acquisition Plan Contents",
    q: "What does an acquisition plan address?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 7.105." },
      { name: "Rule", hint: "What is in it?", model: "The plan addresses the acquisition background and objectives, including statement of need, applicable conditions, cost, capability or performance, delivery or performance-period requirements, and trade-offs, as well as the plan of action, including source selection procedures, contract type, competition, source-selection procedures, acquisition considerations, budgeting and funding, and the milestone chart." },
      { name: "Apply", hint: "Why the long list?", model: "Because the acquisition plan is the document that ties the strategy together. If the CO cannot state their answer to each element, the acquisition is not ready to go." },
    ],
  },
  {
    topic: "Bundling",
    q: "What is contract bundling?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 7.107 and 15 U.S.C. 632(o)(2)." },
      { name: "Rule", hint: "What is it?", model: "Bundling is consolidating two or more requirements for supplies or services previously provided or able to be provided under separate smaller contracts into a single contract that is likely to be unsuitable for award to a small business concern. Bundling requires written justification and approval because it tends to squeeze small businesses out." },
      { name: "Apply", hint: "Why the friction?", model: "Because the government has statutory goals for small business participation. Bundling works against those goals, so the FAR makes the CO document the benefit and get approval before doing it." },
    ],
  },
  {
    topic: "Consolidation",
    q: "What is contract consolidation and how does it differ from bundling?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 7.107-2 and 15 U.S.C. 657q." },
      { name: "Rule", hint: "What is the difference?", model: "Consolidation is combining two or more requirements previously provided under separate smaller contracts into a solicitation for a single contract that is likely to be unsuitable for award to a small business concern. It is broader than bundling. All bundling is consolidation, but consolidation does not require the small-business-displacement analysis in exactly the same form. Consolidation above $2 million requires market research and a written determination that the benefits substantially exceed the benefits of non-consolidated approaches." },
      { name: "Apply", hint: "Why care?", model: "Because like bundling, consolidation reduces small business opportunity. Congress added consolidation as a separate category to catch cases that did not fit the strict bundling definition but had the same practical effect." },
    ],
  },
  {
    topic: "Should-Cost Review",
    q: "What is a should-cost review?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.407-4." },
      { name: "Rule", hint: "What is it?", model: "Should-cost is a specialized form of cost analysis that evaluates the efficiency and economy of a contractor's existing workforce, methods, materials, equipment, operating systems, and management. It is used to identify uneconomical or inefficient practices and to target cost reductions on major acquisitions." },
      { name: "Apply", hint: "Why use it?", model: "Because for large, long-running programs, the contractor's historical costs may bake in inefficiencies that a straight cost analysis would just accept. Should-cost challenges what the work ought to cost if run well, not what it has cost." },
    ],
  },
  // ---- FAR Part 8 ----
  {
    topic: "Priorities for Use of Government Supply Sources",
    q: "What is the priority order for government supply sources?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 8.002." },
      { name: "Rule", hint: "What is the order for supplies?", model: "For supplies, the priority order is: agency inventories; excess from other agencies; Federal Prison Industries (UNICOR); supplies available from the AbilityOne Program; wholesale supply sources such as stock programs of GSA, DLA, VA, and military inventory control points; Federal Supply Schedules; Federal Prison Industries non-mandatory items; and commercial sources." },
      { name: "Apply", hint: "Why a priority list?", model: "Because statute tells the CO to look at government-held stock and mandatory sources first before buying new commercially. The CO checks the list in order and documents what is available or why each source was bypassed." },
    ],
  },
  {
    topic: "AbilityOne Program",
    q: "What is the AbilityOne Program?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 8.7 and 41 U.S.C. Chapter 85." },
      { name: "Rule", hint: "What is it?", model: "AbilityOne is a mandatory source program that provides employment to people who are blind or have other significant disabilities through nonprofit agencies. When a product or service on the Procurement List is available to meet the requirement, the CO must purchase it from the designated AbilityOne source, typically SourceAmerica or NIB affiliates." },
      { name: "Apply", hint: "Why mandatory?", model: "Because Congress set it up that way by statute. If the item is on the Procurement List and meets the need, the CO cannot go around it to a commercial source just because that source is cheaper or faster." },
    ],
  },
  {
    topic: "Federal Supply Schedule Ordering",
    q: "What procedures apply when ordering services from the Federal Supply Schedule?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 8.405-2." },
      { name: "Rule", hint: "What is the rule?", model: "For services priced at hourly rates, the CO prepares a request for quotation describing the work, and the ordering procedures depend on the value. At or below the SAT, the CO may place the order directly with the schedule contractor that represents the best value. Above the SAT, the CO provides the RFQ to as many schedule contractors as practicable to reasonably ensure quotes will be received from at least three. Above $5 million, additional requirements apply, including providing the RFQ to any schedule contractor that requests it." },
      { name: "Apply", hint: "Why the tiered approach?", model: "Because FSS ordering is designed to be faster than open-market competition but still deliver real competition at higher dollar values. The CO picks the right rung based on the order value." },
    ],
  },
  {
    topic: "GSA Schedule BPAs",
    q: "What is a Blanket Purchase Agreement against a Federal Supply Schedule?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 8.405-3." },
      { name: "Rule", hint: "What is it?", model: "A schedule BPA is an agreement the CO establishes with a schedule contractor to fill recurring needs for supplies or services. Orders are placed against the BPA under the terms and conditions of the underlying schedule. Single-award BPAs are limited in duration and require justification above certain values; multiple-award BPAs are the preferred approach for larger recurring needs." },
      { name: "Apply", hint: "How is it different from a Part 13 BPA?", model: "A Part 13 BPA sits on top of open-market simplified procedures and has its own ceiling rules. A Part 8 BPA sits on top of a Federal Supply Schedule contract and inherits that schedule's terms. They are different animals with different rulebooks." },
    ],
  },
  {
    topic: "UNICOR (Federal Prison Industries)",
    q: "What are the rules for using UNICOR?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 8.6." },
      { name: "Rule", hint: "What is the rule?", model: "For DoD, the former mandatory-source status of UNICOR has been modified by statute so that agencies must conduct market research to determine whether UNICOR's product or service is comparable in price, quality, and time of delivery to that available from the private sector. If not comparable, DoD may buy elsewhere. For civilian agencies, UNICOR retains some mandatory-source character, but recent statutory changes have narrowed it." },
      { name: "Apply", hint: "What does the CO actually do?", model: "The CO documents the market research comparison, and if UNICOR is not comparable, proceeds to a commercial source. This is the kind of requirement where knowing the current statutory language matters, because it has moved." },
    ],
  },
  // ---- FAR Part 9 ----
  {
    topic: "Debarment vs Suspension",
    q: "What is the difference between debarment and suspension?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 9.4." },
      { name: "Rule", hint: "What is each?", model: "Suspension is a temporary action taken by the suspending official based on adequate evidence of a cause, pending the completion of an investigation or legal proceedings. It typically runs up to 12 months with a possible extension. Debarment is a longer-term exclusion imposed after notice and an opportunity to respond, based on a conviction, civil judgment, or preponderance of the evidence of a listed cause, and generally runs up to three years." },
      { name: "Apply", hint: "Same effect on the CO?", model: "Yes. Either way, the contractor appears on the SAM exclusions list, and the CO cannot make a new award or exercise an option without a compelling-reason determination from the agency head." },
    ],
  },
  {
    topic: "Organizational Conflict of Interest",
    q: "What is an organizational conflict of interest?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 9.5." },
      { name: "Rule", hint: "What is it?", model: "An OCI exists when, because of other activities or relationships, a contractor is unable or potentially unable to render impartial assistance or advice to the government, or the contractor's objectivity in performing the work is or might be otherwise impaired, or the contractor has an unfair competitive advantage. The three recognized categories are impaired objectivity, unequal access to information, and biased ground rules." },
      { name: "Apply", hint: "What does the CO do?", model: "The CO identifies and evaluates potential OCIs as early in the acquisition process as possible, and either avoids, neutralizes, or mitigates the conflict. Mitigation plans go in the contract file. Unmitigated OCIs can be grounds for exclusion from competition." },
    ],
  },
  {
    topic: "Pre-Award Survey",
    q: "What is a pre-award survey?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 9.106." },
      { name: "Rule", hint: "What is it?", model: "A pre-award survey is an evaluation by a surveying activity, typically DCMA for DoD, of a prospective contractor's capability to perform a proposed contract. It is used when information on hand is not sufficient to make a responsibility determination, particularly for complex or high-risk acquisitions." },
      { name: "Apply", hint: "When do COs ask for one?", model: "When the paper record on the offeror is thin or ambiguous and the dollar value or risk justifies the cost and schedule of the survey. The CO does not need one for every procurement. But for a first-time contractor on a high-value award, it is the tool." },
    ],
  },
  // ---- FAR Part 10 ----
  {
    topic: "Market Research",
    q: "What is market research and when is it required?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Part 10." },
      { name: "Rule", hint: "What is required?", model: "Agencies must conduct market research appropriate to the circumstances before developing new requirements documents, before soliciting offers for acquisitions with an estimated value in excess of the simplified acquisition threshold, before soliciting offers for acquisitions at or below the SAT when adequate information is not available and the circumstances justify its cost, and before soliciting offers for acquisitions that could lead to bundling or consolidation." },
      { name: "Apply", hint: "What does it look like?", model: "Market research techniques include contacting knowledgeable individuals in government and industry, reviewing results of recent market research, publishing formal requests for information, querying government and commercial databases, participating in interactive online communications with industry, and reviewing catalogs and product literature. The documentation goes in the contract file." },
    ],
  },
  {
    topic: "Market Research for Commercial Determination",
    q: "How does market research drive the commercial item determination?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 10.002 and FAR Part 12." },
      { name: "Rule", hint: "What is the rule?", model: "Agencies must use the results of market research to determine whether the needs can be met by items of a type customarily available in the commercial marketplace, by items of a type customarily available with modifications, or by items used exclusively for government purposes. If commercial items or services will meet the need, Part 12 procedures apply." },
      { name: "Apply", hint: "Why does this matter?", model: "Because Part 12 changes the clause package, the pricing approach, and the contract type menu. The commercial determination is not a checkbox, it is a market-research conclusion that gets memorialized in the file." },
    ],
  },
  // ---- FAR Part 11 ----
  {
    topic: "Describing Agency Needs",
    q: "What is the preferred order for describing agency needs?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 11.002 and 11.101." },
      { name: "Rule", hint: "What is the order?", model: "Agencies must state their requirements with respect to function to be performed, performance required, or essential physical characteristics, in that order of preference. Design specifications should only be used when function and performance descriptions are insufficient. The purpose is to promote competition and innovation by leaving room for multiple solutions." },
      { name: "Apply", hint: "Why function first?", model: "Because specifying the function the government needs, rather than the way a contractor must build the solution, opens the door to more offerors and to technical innovation. Design specs lock in one approach and can be protested as unduly restrictive if there is no good reason for them." },
    ],
  },
  {
    topic: "Brand Name or Equal",
    q: "When can a solicitation use a brand name or equal description?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 11.104." },
      { name: "Rule", hint: "What is the rule?", model: "A brand name or equal purchase description may be used only when the particular brand name product is essential to the government's requirements and market research indicates other companies' similar products, or products lacking the particular feature, do not meet the need. The brand name description must identify the salient physical, functional, or performance characteristics that an equal product must meet." },
      { name: "Apply", hint: "Why so restrictive?", model: "Because brand name descriptions limit competition. The FAR lets the CO use them, but only when the CO can articulate the specific features the government actually needs, so that other vendors know what it takes to be considered equal." },
    ],
  },
  {
    topic: "Brand Name Only Justification",
    q: "When is a brand name only (not brand name or equal) permitted?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 11.105 and FAR 6.302-1." },
      { name: "Rule", hint: "What is the rule?", model: "A brand name only acquisition is a limitation of sources and must be supported by a justification under FAR 6.302-1(c), or for commercial item acquisitions under FAR 13 or 12, by a limited-source justification in accordance with FAR 8.405-6 or 13.106-1(b). The justification must explain why only the brand name item will meet the need." },
      { name: "Apply", hint: "So what does the CO do?", model: "The CO cannot just write brand name only in the specs and move on. They have to build a limited-sources J&A that explains why nothing else will do, get it approved at the right level, and post it publicly." },
    ],
  },
  // ---- FAR Part 12 ----
  {
    topic: "Commercial Item Determination",
    q: "How is an item determined to be a commercial product or service?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 2.101 definition and FAR 10.002 and 12.102." },
      { name: "Rule", hint: "What is the test?", model: "The CO uses market research results to determine whether the item meets the definition of a commercial product or commercial service under FAR 2.101. The definition includes items customarily used by the general public or non-governmental entities and either sold, leased, or licensed, or offered for sale, lease, or license to the general public. The definition also includes items of a type with minor modifications, and commercial services sold in substantial quantities in the commercial marketplace." },
      { name: "Apply", hint: "Why does the CO care?", model: "Because if the determination is commercial, Part 12 applies, which changes the clause package, the cost-or-pricing data requirements, and the contract type options. The determination and its basis go in the contract file." },
    ],
  },
  {
    topic: "FAR 52.212-4",
    q: "What is FAR 52.212-4 and what is special about it?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 12.301 and 52.212-4." },
      { name: "Rule", hint: "What is it?", model: "FAR 52.212-4 is the Contract Terms and Conditions, Commercial Products and Commercial Services clause. It is the baseline commercial clause, covering inspection, assignments, changes, disputes, excusable delay, invoice, payment, patent indemnity, termination for convenience, termination for cause, title, warranty, and the limitation of liability. It is a single integrated clause rather than a stack of individual Part 52 clauses." },
      { name: "Apply", hint: "Why one consolidated clause?", model: "Because commercial buyers do not accept the standard government FAR clauses, and Part 12 is designed to look like commercial terms. 52.212-4 gives the CO a commercial-looking package that satisfies the statutory requirements without overloading the contractor with government-unique clauses." },
    ],
  },
  {
    topic: "Commercial Item Contract Types",
    q: "What contract types are permitted for commercial items?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 12.207." },
      { name: "Rule", hint: "What is allowed?", model: "Firm-fixed-price and fixed-price with economic price adjustment are the authorized contract types for commercial items. Time-and-materials and labor-hour contracts may be used for commercial services under specific circumstances and subject to a determination that no other contract type is suitable. Cost-reimbursement contracts are not authorized for commercial items." },
      { name: "Apply", hint: "Why the narrow menu?", model: "Because commercial items are supposed to be priced the way the commercial market prices them, which is almost always fixed-price. Cost-reimbursement defeats the purpose of buying commercial." },
    ],
  },
  // ---- FAR Part 13 ----
  {
    topic: "Subpart 13.5 Commercial Item Test Program",
    q: "What does the Subpart 13.5 test program authorize?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR Subpart 13.5." },
      { name: "Rule", hint: "What is it?", model: "Subpart 13.5 authorizes the use of simplified procedures for the acquisition of commercial products and commercial services at values above the simplified acquisition threshold and up to $7.5 million, with a higher ceiling for acquisitions supporting contingency, humanitarian, or CBRN response operations. The substance of the acquisition is governed by Part 12, and 13.5 just provides the streamlined process path." },
      { name: "Apply", hint: "Why does this exist?", model: "Because almost everything below that ceiling is a commercial product or service, and the government does not need to run a full Part 15 source selection to buy a commercial item. The CO still publicizes, competes, and documents, but the procedural overhead matches the risk." },
    ],
  },
  // ---- FAR Part 15 ----
  {
    topic: "Weaknesses, Significant Weaknesses, Deficiencies",
    q: "What is the difference between a weakness, a significant weakness, and a deficiency?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.001." },
      { name: "Rule", hint: "What is each?", model: "A weakness is a flaw in the proposal that increases the risk of unsuccessful contract performance. A significant weakness is a flaw that appreciably increases the risk of unsuccessful contract performance. A deficiency is a material failure of a proposal to meet a government requirement, or a combination of significant weaknesses that increases the risk of unsuccessful contract performance to an unacceptable level." },
      { name: "Apply", hint: "Why do the labels matter?", model: "Because they drive what has to happen in exchanges. Deficiencies and significant weaknesses must be discussed if the CO opens discussions. The label controls whether the offeror gets a chance to fix it, so the evaluators cannot be sloppy about which bucket a finding goes in." },
    ],
  },
  {
    topic: "Evaluation Notices",
    q: "What is an evaluation notice?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.306." },
      { name: "Rule", hint: "What is it?", model: "An evaluation notice, or EN, is the mechanism by which the CO communicates with offerors during discussions. ENs identify deficiencies, significant weaknesses, and other aspects of the proposal that could be altered or explained to materially enhance the proposal's potential for award. ENs are not a prescribed FAR term of art, but they are the standard practice for running discussions in negotiated source selections." },
      { name: "Apply", hint: "Why formalize it?", model: "Because discussions have rules. The CO cannot engineer the proposal or disclose another offeror's approach, but must give each offeror a meaningful opportunity to fix its deficiencies. ENs are the paper trail that shows the CO held discussions fairly." },
    ],
  },
  {
    topic: "Final Proposal Revision",
    q: "What is a final proposal revision?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.307." },
      { name: "Rule", hint: "What is it?", model: "When discussions are concluded, the CO requests final proposal revisions from all offerors still in the competitive range. The request for FPRs must inform offerors of any limitations on changes and must establish a common cutoff date and time. Award is made based on the evaluation of FPRs against the solicitation's evaluation factors." },
      { name: "Apply", hint: "Why a common cutoff?", model: "Because fairness. Offerors must have the same window to revise and must understand the same ground rules for what can change. Missing the FPR cutoff, or taking one offeror's late revision, is how a source selection gets protested." },
    ],
  },
  {
    topic: "Exchanges with Offerors Before Award",
    q: "What kinds of exchanges can happen with offerors before award?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 15.306." },
      { name: "Rule", hint: "What are the categories?", model: "The categories are: clarifications, which are limited exchanges used when award will be made without discussions and are used only to resolve minor or clerical errors; communications with offerors before establishment of the competitive range, used with offerors whose past performance information is the determining factor preventing them from being in the range or whose exclusion is uncertain; and discussions, which are held with offerors in the competitive range after it is established and involve negotiation of proposal content." },
      { name: "Apply", hint: "Why differentiate?", model: "Because each category has different rules about what the CO can say and do. Calling a negotiation a clarification does not make it one. If the CO is suggesting changes to the proposal, that is discussions, and it triggers the full Part 15 framework." },
    ],
  },
  // ---- FAR Part 16 ----
  {
    topic: "Selecting Contract Type",
    q: "What drives selection of contract type?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 16.103 and 16.104." },
      { name: "Rule", hint: "What is the rule?", model: "The contract type and price are related and should be considered together with the issues of risk. The objective is to negotiate a contract type and price that will result in reasonable contractor risk and provide the contractor with the greatest incentive for efficient and economical performance. Selection factors include price competition, price analysis, cost analysis, type and complexity of the requirement, urgency of the requirement, period of performance, contractor's technical capability and financial responsibility, adequacy of the contractor's accounting system, concurrent contracts, extent and nature of proposed subcontracting, and acquisition history." },
      { name: "Apply", hint: "How does the CO actually choose?", model: "The CO works through the factors with the program office and the pricer, weighs who should bear which risks, and picks the type that allocates risk appropriately for the work at hand. Firm fixed price is the default when the work is well defined; uncertainty pushes the CO toward cost-reimbursement or incentive types." },
    ],
  },
  {
    topic: "Cost-Reimbursement Suitability",
    q: "When is a cost-reimbursement contract appropriate?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 16.301-2 and 16.301-3." },
      { name: "Rule", hint: "What is the rule?", model: "Cost-reimbursement contracts are suitable only when the uncertainties involved in contract performance do not permit costs to be estimated with sufficient accuracy to use any type of fixed-price contract. Required findings include that the contractor's accounting system is adequate for determining costs applicable to the contract, appropriate government surveillance during performance will be provided, and the contract type is likely to be less costly than any other type or it is impracticable to obtain supplies or services of the kind or quality required without its use." },
      { name: "Apply", hint: "What does adequate accounting mean?", model: "It means the contractor can identify costs by contract and segregate direct and indirect costs in a way that survives an audit. Without that, cost-reimbursement is not allowed, because there is no reliable way to know what the government is actually paying for." },
    ],
  },
  {
    topic: "IDIQ Minimum and Maximum",
    q: "Why must an IDIQ contract have a stated minimum and maximum?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 16.504." },
      { name: "Rule", hint: "What is the rule?", model: "An IDIQ contract must require the government to order and the contractor to furnish at least a stated minimum quantity of supplies or services and, if ordered, the contractor must furnish any additional quantities, not to exceed the stated maximum. The stated minimum must be more than a nominal amount, but it should not exceed the amount the government is fairly certain to order." },
      { name: "Apply", hint: "Why does consideration matter?", model: "Because a contract without a guaranteed minimum has no consideration flowing to the contractor, and may be unenforceable. The minimum is what makes the IDIQ a binding contract instead of just an options catalog. The maximum is what bounds the government's commitment." },
    ],
  },
  {
    topic: "Fair Opportunity Exceptions",
    q: "What are the exceptions to the fair opportunity requirement for multiple-award IDIQ orders?",
    slots: [
      { name: "Authority", hint: "Where does this live?", model: "FAR 16.505(b)(2) and 10 U.S.C. 2304c." },
      { name: "Rule", hint: "What are the exceptions?", model: "Fair opportunity does not apply when: the agency need for the supplies or services is of such unusual urgency that providing a fair opportunity would result in unacceptable delays; only one awardee is capable of providing the required supplies or services at the level of quality required; the order must be issued on a sole-source basis in the interest of economy and efficiency as a logical follow-on to an order already issued under the contract, provided all awardees were given a fair opportunity to be considered for the original order; it is necessary to place an order to satisfy a minimum guarantee; a statute expressly authorizes or requires that the purchase be made from a specified source; or for DoD, in the case of an order for services, the order satisfies a specified exception." },
      { name: "Apply", hint: "Who approves a fair opportunity exception?", model: "The justification is documented and approved at levels that scale with the order value, similar to a J&A under Part 6. The CO cannot just decide to skip fair opportunity; the decision is justified in writing and approved." },
    ],
  },
  // ---- FAR Part 17 ----
  {
    topic: "Multi-Year vs Multiple Year Contracts",
    q: "What is the difference between a multi-year contract and a multiple year contract?",
    slots: [

// Shuffle the question order so each session is different
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
const order = shuffle(QUESTIONS.map((_, i) => i));
let position = 0;
let revealStep = 0;

function loadQuestion(orderIdx) {
  const q = QUESTIONS[order[orderIdx]];
  document.getElementById("question").textContent = q.q;
  document.getElementById("card-label").textContent =
    "Card " + (orderIdx + 1) + " of " + order.length + " \u00B7 " + q.topic;
  document.getElementById("progress").textContent =
    "Card " + (orderIdx + 1) + " of " + order.length;
  const slots = document.getElementById("slots");
  slots.innerHTML = "";
  q.slots.forEach((s, idx) => {
    const slot = document.createElement("div");
    slot.className = "slot";
    slot.id = "slot-" + idx;
    const precisionHtml = s.precision
      ? '<span class="precision-note">' + s.precision + '</span>'
      : '';
    slot.innerHTML =
      '<div class="slot-label">' + s.name + '</div>' +
      '<div class="slot-hint">' + s.hint + '</div>' +
      '<textarea rows="2" placeholder="Your answer..."></textarea>' +
      '<div class="slot-model">' + s.model + precisionHtml + '</div>';
    slots.appendChild(slot);
  });
  revealStep = 0;
  const btn = document.getElementById("reveal-btn");
  btn.disabled = false;
  btn.textContent = "Show me a strong answer";
  document.getElementById("self-assess").classList.remove("show");
  document.getElementById("next-row").classList.remove("show");
  document.querySelectorAll(".assess-btn").forEach(b => b.classList.remove("selected"));
  // Scroll the card back to the top so the question is in view
  window.scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("reveal-btn").addEventListener("click", () => {
  const q = QUESTIONS[order[position]];
  if (revealStep < q.slots.length) {
    document.getElementById("slot-" + revealStep).classList.add("revealed");
    revealStep++;
    const btn = document.getElementById("reveal-btn");
    if (revealStep < q.slots.length) {
      btn.textContent = "Reveal next";
    } else {
      btn.disabled = true;
      btn.textContent = "Answer revealed";
      setTimeout(() => {
        document.getElementById("self-assess").classList.add("show");
      }, 700);
    }
  }
});

document.querySelectorAll(".assess-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".assess-btn").forEach(b => b.classList.remove("selected"));
    btn.classList.add("selected");
    document.getElementById("next-row").classList.add("show");
  });
});

function goToNextCard() {
  position = (position + 1) % order.length;
  // If we wrapped, reshuffle so the next pass feels fresh
  if (position === 0) {
    shuffle(order);
  }
  loadQuestion(position);
}

document.getElementById("next-btn").addEventListener("click", goToNextCard);
document.getElementById("skip-btn").addEventListener("click", goToNextCard);

loadQuestion(0);

// ─────── ambient canvas: drifting embers + warm corner glow ───────
const canvas = document.getElementById("ambient-canvas");
const ctx = canvas.getContext("2d");
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const motes = [];
function seedMotes() {
  motes.length = 0;
  for (let i = 0; i < 40; i++) {
    motes.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: -(0.04 + Math.random() * 0.11),
      vx: (Math.random() - 0.5) * 0.04,
      r: 0.7 + Math.random() * 1.5,
      a: 0.12 + Math.random() * 0.35,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
seedMotes();

let t0 = performance.now();
function tick(now) {
  const dt = Math.min(3, (now - t0) / 16);
  t0 = now;
  ctx.clearRect(0, 0, W, H);

  // warm corner glow (lantern feel)
  const cx = W * 0.92;
  const cy = H * 0.88;
  const breath = 1 + Math.sin(now / 2400) * 0.05;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 360 * breath);
  grad.addColorStop(0, "rgba(217, 160, 91, 0.16)");
  grad.addColorStop(0.45, "rgba(217, 160, 91, 0.05)");
  grad.addColorStop(1, "rgba(217, 160, 91, 0)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // a second smaller glow on the opposite side, very faint
  const cx2 = W * 0.08;
  const cy2 = H * 0.15;
  const breath2 = 1 + Math.sin(now / 3100 + 1) * 0.04;
  const grad2 = ctx.createRadialGradient(cx2, cy2, 0, cx2, cy2, 280 * breath2);
  grad2.addColorStop(0, "rgba(154, 184, 232, 0.06)");
  grad2.addColorStop(1, "rgba(154, 184, 232, 0)");
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // motes
  motes.forEach(m => {
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    m.phase += 0.018 * dt;
    if (m.y < -10) {
      m.y = H + 10;
      m.x = Math.random() * W;
    }
    if (m.x < -10) m.x = W + 10;
    if (m.x > W + 10) m.x = -10;

    const flicker = 0.7 + Math.sin(m.phase) * 0.3;
    const size = m.r * 6;
    const g2 = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, size);
    g2.addColorStop(0, "rgba(232, 200, 140, " + (m.a * flicker) + ")");
    g2.addColorStop(1, "rgba(232, 200, 140, 0)");
    ctx.fillStyle = g2;
    ctx.fillRect(m.x - size, m.y - size, size * 2, size * 2);
  });

  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

// ─────── ambient music ───────
const PLAYLIST = [
  "audio/Warrant%20Study%201.mp3",
  "audio/Warrant%20Study%202.mp3",
  "audio/Warrant%20Study%203.mp3",
  "audio/Warrant%20Study%204.mp3",
  "audio/Warrant%20Study%205.mp3",
  "audio/Warrant%20Study%206.mp3",
  "audio/study-night-a.mp3",
  "audio/study-night-b.mp3",
  "audio/starry-night-a.mp3",
  "audio/starry-night-b.mp3",
  "audio/starry-night-2-a.mp3",
  "audio/starry-night-2-b.mp3",
];

function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────── ambient music ───────
// Goal: start music as close to 100% of the time as the browser will allow.
//
// Browser autoplay-with-sound policy is the constraint. Chrome and Safari will
// only autoplay sound if (a) the user has built up engagement on this domain,
// (b) the page received a user-activation token from a click on the prior
// page, or (c) the user has interacted on this page already. We try every
// legal path:
//
//   1. autoplay attribute on the <audio> element
//   2. .play() called immediately on script load (uses the navigation gesture)
//   3. .play() called again on canplay (covers the case where step 2 failed
//      because the file wasn't buffered yet, but the activation is still alive)
//   4. .play() called on every plausible first-interaction event
//      (click, keydown, pointerdown, touchstart) — first one wins
//   5. sessionStorage flag so once the user enables sound in this session,
//      subsequent loads of any page in this session retry autoplay aggressively
const ambientAudio = document.getElementById("ambient-audio");
const musicBtn = document.getElementById("music-toggle");
const musicLabel = document.getElementById("music-label");
let musicOn = false;
let queue = shuffled(PLAYLIST);
let qIdx = 0;
ambientAudio.volume = 0.3;
ambientAudio.src = queue[0];

// Session memory: once the user has enabled sound this session, remember it.
const SOUND_FLAG = "contractinghq.sound.enabled";
function rememberSoundEnabled() {
  try { sessionStorage.setItem(SOUND_FLAG, "1"); } catch (_) {}
}
function userPreviouslyEnabledSound() {
  try { return sessionStorage.getItem(SOUND_FLAG) === "1"; } catch (_) { return false; }
}

console.log("[music] init, first track:", queue[0], "session-enabled:", userPreviouslyEnabledSound());

function setMusicOnUi(on) {
  musicOn = on;
  if (on) {
    musicBtn.classList.remove("music-prompt");
    rememberSoundEnabled();
  }
  musicBtn.style.color = on ? "var(--amber)" : "";
  musicBtn.style.borderColor = on ? "rgba(217, 175, 110, 0.45)" : "";
  musicLabel.textContent = on ? "Sound on" : "Sound";
}

function playCurrent(reason) {
  if (musicOn) return;
  console.log("[music] play attempt (" + (reason || "") + "):", ambientAudio.src);
  const p = ambientAudio.play();
  if (p && typeof p.then === "function") {
    p.then(() => {
      console.log("[music] playing");
      setMusicOnUi(true);
    }).catch((err) => {
      console.log("[music] play blocked or failed:", err && err.name, err && err.message);
      musicBtn.classList.add("music-prompt");
    });
  } else {
    setMusicOnUi(true);
  }
}

function advanceTrack() {
  qIdx = (qIdx + 1) % queue.length;
  if (qIdx === 0) queue = shuffled(PLAYLIST);
  console.log("[music] advance to:", queue[qIdx]);
  ambientAudio.src = queue[qIdx];
  if (musicOn) {
    const p = ambientAudio.play();
    if (p && typeof p.then === "function") p.catch(() => {});
  }
}

ambientAudio.addEventListener("ended", () => {
  console.log("[music] track ended");
  advanceTrack();
});

ambientAudio.addEventListener("error", (e) => {
  const err = ambientAudio.error;
  console.log("[music] audio error:", err && err.code, "src:", ambientAudio.currentSrc || ambientAudio.src);
});

// 1. Try autoplay immediately, before any other JS runs in this block.
//    Uses the navigation activation token from the prior-page click if it's
//    still alive.
playCurrent("immediate");

// 2. Retry once the file is actually buffered. This is the most common reason
//    the immediate attempt fails — the audio element hasn't loaded the file
//    yet so .play() rejects even though a user gesture was available.
ambientAudio.addEventListener("canplay", () => {
  if (!musicOn) playCurrent("canplay");
}, { once: true });

// 3. Retry on any first user interaction. The first event of any of these
//    types triggers a play attempt; once we're playing, the listeners
//    self-remove. We use { capture: true } so we beat any inner stopPropagation,
//    and we explicitly skip the music button itself so its own toggle handler
//    decides what to do (otherwise we'd race and start-then-stop).
function startOnFirstInteraction(e) {
  if (musicOn) return;
  if (e && e.target && e.target.closest && e.target.closest("#music-toggle")) return;
  console.log("[music] first interaction:", e && e.type);
  playCurrent("first-interaction");
}
const interactionEvents = ["pointerdown", "click", "keydown", "touchstart"];
interactionEvents.forEach((evt) => {
  document.addEventListener(evt, startOnFirstInteraction, { capture: true });
});
// When music is on, tear down the interaction listeners so they don't fire forever.
ambientAudio.addEventListener("playing", () => {
  interactionEvents.forEach((evt) => {
    document.removeEventListener(evt, startOnFirstInteraction, { capture: true });
  });
}, { once: true });

// 4. Retry when the tab becomes visible (covers "opened in background tab,
//    then switched to it" — visibility change can pair with an OS-level
//    interaction to satisfy the autoplay policy).
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && !musicOn) {
    playCurrent("visibility");
  }
});

// The music button toggles on/off.
musicBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  console.log("[music] button click, musicOn was:", musicOn);
  if (musicOn) {
    ambientAudio.pause();
    setMusicOnUi(false);
  } else {
    playCurrent("button");
  }
});

  "The board wants to see how you would do the job. You already do the job.",
  "You belong in the room. Walk in like it.",
  "When you slow down, the right answer comes.",
  "You write clean contract files. That instinct is the warrant.",
  "Plain reading wins. Trust yours.",
  "You have already thought about harder things than this today.",
  "Sole source is not a trap. You know how to document it.",
  "Source selection lives in Part 15, but it leans on 12 and 13 too. You already know that.",
  "Asking legal is not weakness. It is the job, and you do it well.",
  "The CO they want is the one already sitting in your chair.",
  "Take the breath. The answer is already there.",
  "You have done this before, in smaller rooms. The big room is the same room.",
  "Knowing where to look is most of the warrant. You know where to look.",
  "Your judgment is why they gave you the file. Trust it.",
  "It is going to connect. Give it a moment.",
  "Dan Cary cares. And that is why he contributed to this page for you.",
];

const aphoEl = document.getElementById("aphorism");
let aIdx = Math.floor(Math.random() * APHORISMS.length);

// Animation duration must match the CSS @keyframes aphorism-drift
const DRIFT_MS = 14000;
const QUIET_MS = 9000;

function cycleAphorism() {
  aphoEl.textContent = APHORISMS[aIdx];
  // Re-trigger the CSS animation by removing the class, forcing a reflow, then re-adding
  aphoEl.classList.remove("drifting");
  void aphoEl.offsetWidth;
  aphoEl.classList.add("drifting");
  setTimeout(() => {
    aphoEl.classList.remove("drifting");
    aIdx = (aIdx + 1) % APHORISMS.length;
    setTimeout(cycleAphorism, QUIET_MS);
  }, DRIFT_MS);
}

setTimeout(cycleAphorism, 5500);
