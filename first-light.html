<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Light · ContractingHQ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #02030a;
    --ink-deep: #000004;
    --silver: #d8e0ec;
    --silver-soft: rgba(216, 224, 236, 0.72);
    --silver-faint: rgba(216, 224, 236, 0.42);
    --warm: #f5e4b8;
    --accent: #9ab8e8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--ink-deep);
    color: var(--silver);
    font-family: 'Cormorant Garamond', Georgia, serif;
    cursor: default;
    -webkit-font-smoothing: antialiased;
  }

  /* canvases stack */
  #nebula, #stars-bg, #stars-fg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  #nebula  { z-index: 1; }
  #stars-bg { z-index: 2; }
  #stars-fg { z-index: 3; cursor: crosshair; }

  /* overlay UI */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 4;
    pointer-events: none;
  }

  .corner {
    position: fixed;
    z-index: 6;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--silver-faint);
    pointer-events: auto;
    user-select: none;
    transition: color 600ms ease, opacity 600ms ease;
  }
  .corner:hover { color: var(--silver); }

  .corner a, .corner button {
    color: inherit;
    background: none;
    border: none;
    font: inherit;
    cursor: pointer;
    text-decoration: none;
    padding: 6px 10px;
  }

  .corner-tl { top: 24px; left: 28px; }
  .corner-tr { top: 24px; right: 28px; display: flex; gap: 14px; align-items: center; }
  .corner-bl { bottom: 24px; left: 28px; max-width: 320px; line-height: 1.5; }
  .corner-br { bottom: 24px; right: 28px; }

  .title-mark {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 18px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--silver-soft);
  }

  .helper {
    opacity: 0;
    transition: opacity 1800ms ease 600ms;
  }
  .helper.show { opacity: 1; }

  /* the floating reveal panel that follows hovered stars */
  #reveal {
    position: fixed;
    z-index: 5;
    pointer-events: none;
    max-width: 360px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 900ms ease, transform 900ms ease;
  }
  #reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }
  /* pinned mode: used in galaxy view so the reveal panel doesn't follow
     the cursor and clip off the bottom of the screen. The panel sits
     locked to the right side, vertically centered, with a comfortable
     reading width. */
  #reveal.pinned {
    left: auto !important;
    right: 56px;
    top: 50% !important;
    transform: translateY(-50%);
    max-width: 420px;
    width: 420px;
  }
  #reveal.pinned.visible {
    transform: translateY(-50%);
  }
  #reveal.pinned .word {
    font-size: 32px;
  }
  #reveal.pinned .desc {
    max-width: 100%;
    font-size: 15px;
    line-height: 1.7;
  }
  #reveal .word {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 38px;
    letter-spacing: 0.02em;
    color: var(--silver);
    line-height: 1.05;
    text-shadow: 0 0 24px rgba(154, 184, 232, 0.35);
  }
  /* affirmation styling: no headline, the whole line is the text,
     in a slightly more flowing italic so it reads like a thought */
  #reveal.affirm {
    max-width: 460px;
  }
  #reveal.affirm .word {
    font-style: italic;
    font-size: 26px;
    line-height: 1.4;
    color: var(--silver-soft);
    text-shadow: 0 0 28px rgba(245, 220, 160, 0.22);
  }
  #reveal.affirm .desc { display: none; }
  #reveal .desc {
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 14px;
    line-height: 1.65;
    color: var(--silver-soft);
    max-width: 340px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 1200ms ease 350ms, transform 1200ms ease 350ms;
  }
  #reveal.lingering .desc {
    opacity: 1;
    transform: translateY(0);
  }

  /* status line: when does the next star arrive */
  #status {
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--silver-faint);
  }
  #status .num { color: var(--silver-soft); }

  /* first-paint welcome veil that fades away */
  #veil {
    position: fixed;
    inset: 0;
    z-index: 10;
    background: var(--ink-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    transition: opacity 2400ms ease;
  }
  #veil.gone { opacity: 0; pointer-events: none; }
  #veil .breath {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 28px;
    letter-spacing: 0.06em;
    color: var(--silver-soft);
    opacity: 0;
    animation: breathe 5s ease forwards;
  }
  #veil .sub {
    margin-top: 18px;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--silver-faint);
    opacity: 0;
    animation: breathe 5s ease 600ms forwards;
  }
  @keyframes breathe {
    0%   { opacity: 0; transform: translateY(8px); }
    20%  { opacity: 1; transform: translateY(0); }
    80%  { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-4px); }
  }

  /* a soft note that briefly shows when a new star appears */
  #newstar-note {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: var(--silver-soft);
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    text-shadow: 0 0 24px rgba(245, 228, 184, 0.25);
    transition: opacity 2200ms ease;
  }
  #newstar-note.show { opacity: 1; }

  /* music toggle */
  .music-btn {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid var(--silver-faint);
    transition: border-color 600ms ease, color 600ms ease;
  }
  .music-btn:hover { border-color: var(--silver); color: var(--silver); }
  .music-btn svg { width: 11px; height: 11px; fill: currentColor; }

  /* back-to-sky link, only visible inside a galaxy view */
  #back-button {
    position: fixed;
    top: 24px;
    left: 28px;
    z-index: 7;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.04em;
    color: var(--silver-soft);
    cursor: pointer;
    pointer-events: auto;
    text-decoration: none;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 900ms ease, transform 900ms ease, color 600ms ease;
    pointer-events: none;
  }
  #back-button.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  #back-button:hover { color: var(--silver); }

  /* galaxy title overlay shown when the user is inside a galaxy */
  #galaxy-title {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    z-index: 6;
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 1200ms ease, transform 1200ms ease;
  }
  #galaxy-title.show {
    opacity: 1;
    transform: translateY(0);
  }
  #galaxy-title .gt-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 34px;
    letter-spacing: 0.04em;
    color: var(--silver);
    text-shadow: 0 0 28px rgba(154, 184, 232, 0.35);
  }
  #galaxy-title .gt-sub {
    margin-top: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--silver-soft);
  }
  /* RFO companion note inside the reveal panel */
  #reveal .rfo-note {
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(180, 195, 220, 0.18);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--silver-faint);
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 1200ms ease 500ms, transform 1200ms ease 500ms;
  }
  #reveal .rfo-note .rfo-label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--silver-faint);
    margin-bottom: 4px;
  }
  #reveal.lingering .rfo-note { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<canvas id="nebula"></canvas>
<canvas id="stars-bg"></canvas>
<canvas id="stars-fg"></canvas>

<div class="overlay"></div>

<!-- corner UI -->
<div class="corner corner-tr">
  <button class="music-btn" id="music-toggle" title="Sound" aria-label="Toggle sound">
    <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
  </button>
  <a href="training.html" title="Return">Return</a>
</div>

<a id="back-button" href="#" title="Back to the sky">← back to the sky</a>

<div id="galaxy-title">
  <div class="gt-name"></div>
  <div class="gt-sub"></div>
</div>

<div class="corner corner-bl helper" id="helper">
  <div id="status">Next light: <span class="num">—</span></div>
</div>

<div class="corner corner-br helper">
  <span style="text-transform: none; letter-spacing: 0; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--silver-faint);">hover a star</span>
</div>

<!-- floating reveal -->
<div id="reveal">
  <div class="word"></div>
  <div class="desc"></div>
  <div class="rfo-note"><span class="rfo-label">Under the RFO</span><span class="rfo-text"></span></div>
</div>

<div id="newstar-note">a new light has come</div>

<!-- opening veil -->
<div id="veil">
  <div class="breath">be still for a moment</div>
  <div class="sub">First Light</div>
</div>

<!-- ambient audio: a shuffled playlist that cycles forever -->
<audio id="ambient" preload="auto"></audio>

<script>
/* ============================================================
   First Light
   A quiet place. Stars arrive one at a time, on a long cooldown.
   Each star carries a small thing worth knowing or being told.
   ============================================================ */

// ---------- content -----------------------------------------------------
// Stable IDs so localStorage survives content edits.

// A pool of greetings. One is chosen at random each session and shown as
// an ephemeral welcome star — it is NOT persisted.
const WELCOMES = [
  "Welcome. You are still allowed to be here.",
  "You came in. That is a quiet kind of brave.",
  "Welcome. Take a moment if you would like one.",
  "Hello. The sky kept turning while you were away.",
  "Welcome. There is nothing here that needs you to be ready.",
  "Welcome. You do not have to do anything but breathe.",
  "Welcome. The lights are on for you.",
  "Hello. The chair is still here.",
  "Welcome. Nothing is owed.",
  "Welcome. Be still for a moment.",
  "Hello. We saved your place.",
  "Welcome back. You are exactly on time.",
  "Hello. The night was kind to your stars while you were gone.",
  "Welcome. You can put the day down at the door.",
];

const CONTENT = [
  // terminology — Register C voice: quiet but real
  { id: "t-rfp", kind: "term", word: "RFP",
    desc: "Request for Proposal. You are asking vendors how they would do the work, not just what they would charge." },
  { id: "t-rfq", kind: "term", word: "RFQ",
    desc: "Request for Quotation. You are asking vendors what they would charge for something already specified." },
  { id: "t-ifb", kind: "term", word: "IFB",
    desc: "Invitation for Bid. Sealed prices on a clearly defined thing. The lowest responsive bid wins." },
  { id: "t-option", kind: "term", word: "Option",
    desc: "A future year of the contract that the government may choose to exercise, on terms agreed up front." },
  { id: "t-mod", kind: "term", word: "Modification",
    desc: "A change to a contract that is already in force, signed by both sides." },
  { id: "t-award", kind: "term", word: "Award",
    desc: "The signed agreement that turns a solicitation into a contract." },
  { id: "t-sol", kind: "term", word: "Solicitation",
    desc: "The document the government uses to ask vendors for offers." },
  { id: "t-closeout", kind: "term", word: "Closeout",
    desc: "The administrative finish of a contract, after the work is done and accepted." },
  { id: "t-pp", kind: "term", word: "Past Performance",
    desc: "How well a vendor has done on previous contracts, used to evaluate them now." },
  { id: "t-setaside", kind: "term", word: "Set-aside",
    desc: "A solicitation reserved for a specific category of small business." },
  { id: "t-sole", kind: "term", word: "Sole Source",
    desc: "A contract awarded to one vendor without competing it. There is a reason it could not be competed." },
  { id: "t-sap", kind: "term", word: "SAP",
    desc: "Simplified Acquisition Procedures. The lighter set of rules for smaller-dollar buys." },

  // affirmations — no headline, just the line
  { id: "a-1",  kind: "affirm", text: "There is enough time for you to become who you are becoming." },
  { id: "a-2",  kind: "affirm", text: "Someone built the chair you sit in, hoping someone like you would come along." },
  { id: "a-3",  kind: "affirm", text: "The world is mostly held together by people doing quiet work like yours." },
  { id: "a-4",  kind: "affirm", text: "You will look back at today from a kinder place." },
  { id: "a-5",  kind: "affirm", text: "You belong here, even on the days you do not feel like it." },
  { id: "a-6",  kind: "affirm", text: "Some part of you already knows what to do. The rest of you is catching up." },
  { id: "a-7",  kind: "affirm", text: "What you are learning is also learning you." },
  { id: "a-8",  kind: "affirm", text: "You are not behind. There is no schedule but the one you carry." },
  { id: "a-9",  kind: "affirm", text: "Be patient with the part of you that is still arriving." },
  { id: "a-10", kind: "affirm", text: "Even a very long day is a small part of a long, good life." },
  { id: "a-11", kind: "affirm", text: "The morning still comes for you." },
  { id: "a-12", kind: "affirm", text: "You are allowed to take up space here." },
  { id: "a-13", kind: "affirm", text: "I would rather have done this hard work and been changed by it than never have known what I could carry." },
  { id: "a-14", kind: "affirm", text: "Somewhere ahead of you, an older version of you is rooting for the one reading this." },
];

// ---------- persistence -------------------------------------------------
const KEY = "firstLight.v1";
const HEARTBEAT_MS = 10 * 1000;        // one star arrives every 10 seconds
const INTRO_MS = 4000;                 // dramatic "zoom into the sky" arrival animation
const SHOOT_MIN_MS = 50 * 1000;        // shooting stars: ~every minute, jittered
const SHOOT_MAX_MS = 75 * 1000;
const VEIL_MS = 4400;                  // opening veil duration

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return { stars: [], lastAdded: 0, seen: [] };
    const s = JSON.parse(raw);
    return { stars: s.stars || [], lastAdded: s.lastAdded || 0, seen: s.seen || [] };
  } catch (e) {
    return { stars: [], lastAdded: 0, seen: [] };
  }
}
function saveState(s) {
  try { localStorage.setItem(KEY, JSON.stringify(s)); } catch (e) {}
}

let state = loadState();

// Migration: old versions stored a single persistent "welcome" star.
// Welcomes are now ephemeral (a fresh greeting each session), so strip
// any leftover persistent welcome from the saved state on load.
state.stars = state.stars.filter(s => s.id !== "welcome" && !(s.id || "").startsWith("welcome-"));
state.seen = state.seen.filter(id => id !== "welcome");

// Each page load is a session. Anything in state.stars whose `born` is older
// than SESSION_START is "remembered" — those fade in on a randomized stagger
// so every visit feels different. Anything born after SESSION_START is
// genuinely new and gets the dramatic zoom-in arrival animation.
const SESSION_START = Date.now();

// Ephemeral session-only stars (welcomes). Never persisted to localStorage.
const sessionStars = [];

// Pick a fresh welcome for this visit and place it as a session-only star.
// It arrives just as the opening veil dissolves so it feels like a doorway.
function makeSessionWelcome() {
  const text = WELCOMES[Math.floor(Math.random() * WELCOMES.length)];
  return {
    id: "welcome-session-" + Date.now(),
    isWelcome: true,
    welcomeText: text,
    x: 0.40 + Math.random() * 0.20, // gentle center placement
    y: 0.32 + Math.random() * 0.18,
    _revealAt: SESSION_START + VEIL_MS,  // arrive as the veil fades out
  };
}
sessionStars.push(makeSessionWelcome());

// ---------- galaxies ----------------------------------------------------
// Galaxies are destinations. Each one is a clickable region of the sky
// holding the curated content for a particular FAR Part. They're not
// persisted — they show up in the sky every visit, in a fixed position.
const GALAXIES = [
  {
    id: "far-1",
    title: "FAR Part 1",
    subtitle: "Federal Acquisition Regulations System",
    blurb: "Where the rules about the rules live. How the FAR is structured, how it is changed, who gets to sign contracts on behalf of the United States, and what it actually means to be a contracting officer. The Revolutionary FAR Overhaul reshuffles parts of this in ways that touch every CO — including the renumbering of unauthorized commitments to 1.405 and a reorganization of career development.",
    x: 0.22, y: 0.30,
    tint: { core: "rgba(232, 220, 255, ", arm: "rgba(190, 175, 230, " },
    nodes: [
      { label: "How the FAR Works",
        title: "Purpose, Authority, Issuance",
        text: "Why the FAR exists, where its authority comes from, how it gets published, and how amendments roll out through Federal Acquisition Circulars. This is the part of the regulation that explains the regulation.",
        rfo: "Largely structural; the RFO preserves the basics of how the FAR is issued but is itself rolling out through model deviations rather than the traditional FAC cycle, which is unusual." },
      { label: "Who Maintains the FAR",
        title: "Administration",
        text: "Who maintains the FAR. The Federal Acquisition Regulatory Council, the FAR secretariat, and the procedure for opening a FAR case to actually change something.",
        rfo: "The FAR Council still drives the work under the RFO. The novel piece is the public crowdsourcing campaign — practitioners and vendors submitting feedback on what to keep, cut, or rewrite." },
      { label: "Agency Supplements",
        title: "Agency Acquisition Regulations",
        text: "How agencies write their own supplements, like the DFARS for DoD or the AFFARS for the Air Force. The rule is that supplements implement and supplement the FAR, they do not contradict it.",
        rfo: "Agencies are issuing their own RFO-aligned class deviations in parallel. Reading any clause right now means checking the FAR, the agency supplement, and any active deviation." },
      { label: "Deviations",
        title: "Deviations from the FAR",
        text: "When and how a contracting activity can issue a class or individual deviation, the approval levels required, and the reporting back to the FAR Council. Deviations are how the system bends without breaking.",
        rfo: "Under the RFO this subpart is being repurposed — the overhaul itself is being delivered as a sweeping set of class deviations, and 'Career Development' material is moving into 1.4 in the restructured layout." },
      { label: "Public Participation",
        title: "Agency and Public Participation",
        text: "How proposed FAR rules go out for public comment and how agencies engage industry. The procedural side of writing rules in public.",
        rfo: "RFO leans heavily on this idea but in practice has front-loaded a lot of change before formal rulemaking, which is part of why it is generating so much commentary." },
      { label: "Career Development",
        title: "Career Development, Contracting Authority, Responsibilities",
        text: "Who is allowed to obligate the United States. Warrants, the contracting officer's responsibilities, the contracting officer's representative, and the rules on how authority flows from agency head down through the warrant.",
        rfo: "The contracting officer authority bones stay. The career development piece is moving in the restructured layout, so future references to '1.6' may be talking about something different than they do today." },
      { label: "Contracting Officer Authority",
        title: "Contracting Officer Authority",
        text: "Contracting officers may bind the government only within the authority delegated to them in their warrant. Above the warrant level, you have to route to someone with a bigger one. Below it, you are operating where you are supposed to operate.",
        rfo: "The substance does not change: the warrant is still the source of authority. The renumbering does." },
      { label: "Contracting Officer Responsibilities",
        title: "Contracting Officer Responsibilities",
        text: "The contracting officer is responsible for ensuring performance of all necessary actions for effective contracting, ensuring compliance with the terms, and safeguarding the interests of the United States. It is a short list with a heavy weight.",
        rfo: "RFO trims procedural language elsewhere but the responsibility framework here is exactly the kind of principle the overhaul keeps." },
      { label: "Unauthorized Commitments",
        title: "Unauthorized Commitments and Ratifications",
        text: "An unauthorized commitment is an agreement that is not binding solely because the government representative who made it lacked authority. Ratification is the formal process for making it binding after the fact, when the criteria are met. The ratification floor is the chief of the contracting office, by FAR.",
        rfo: "Renumbered to 1.405 under the Revolutionary FAR Overhaul. The substantive criteria and the floor stay the same; the cite changes." },
      { label: "Determinations and Findings",
        title: "Determinations and Findings",
        text: "A D&F is a written record that supports a discretionary decision the FAR requires the contracting officer to make. The 'determination' is the conclusion; the 'findings' are the facts that support it. Many subsequent parts of the FAR point back here.",
        rfo: "D&F as a concept is preserved. The RFO trims some prescriptive scaffolding around format, leaning more on 'document the why' than on a fixed template." },
    ],
  },
  {
    id: "far-7",
    title: "FAR Part 7",
    subtitle: "Acquisition Planning",
    blurb: "Before the solicitation, before the J&A, before any of it — Part 7 is where the planning happens. Who needs what, what kind of contract makes sense, whether to lease or buy, and which functions are not allowed to be contracted out at all.",
    x: 0.50, y: 0.18,
    tint: { core: "rgba(180, 235, 245, ", arm: "rgba(140, 200, 215, " },
    nodes: [
      { label: "Acquisition Planning",
        title: "Acquisition Plans",
        text: "The written plan that lays out the strategy for an acquisition. The need, the alternatives considered, the contract type, the competition approach, the milestones, the risks, and how the requiring activity and the contracting office will work together. The point is to think about all of it before issuing the solicitation, not after.",
        rfo: "RFO trims the prescriptive content list. The plan still has to exist for significant acquisitions; the format is more in the contracting officer's hands." },
      { label: "Lease or Purchase",
        title: "Equipment Lease or Purchase",
        text: "When the government needs equipment, Part 7 makes you decide whether to lease it or buy it, and document why. The factors include how long you need it, how fast technology is changing, maintenance, and total cost over the life of the requirement. Defaulting to one or the other without thinking is the failure mode the rule exists to prevent.",
        rfo: "Same analysis under the overhaul. The judgment-based framing is the kind of thing the RFO leaves intact." },
      { label: "Inherently Governmental Functions",
        title: "Inherently Governmental Functions",

// Galaxies appear in the sky shortly after the welcome arrives. They use the
// same arrival animation as stars so they feel like part of the constellation.
const galaxies = GALAXIES.map(g => ({
  ...g,
  _revealAt: SESSION_START + VEIL_MS + 1800,
  _rotSeed: Math.random() * Math.PI * 2,
}));

// ---------- view state --------------------------------------------------
// "sky" = constellation view, "fadeOut" = transitioning into a galaxy,
// "galaxy" = zoomed in on a galaxy's contents, "fadeIn" = transitioning back.
let viewMode = "sky";
let activeGalaxy = null;
let modeStartTime = 0;
const FADE_MS = 1100;

function enterGalaxy(g) {
  activeGalaxy = g;
  viewMode = "fadeOut";
  modeStartTime = Date.now();
  freezeHeartbeat();
  const backBtn = document.getElementById("back-button");
  if (backBtn) backBtn.classList.add("show");
  const gt = document.getElementById("galaxy-title");
  if (gt) {
    gt.querySelector(".gt-name").textContent = g.title;
    gt.querySelector(".gt-sub").textContent = g.subtitle;
    setTimeout(() => gt.classList.add("show"), FADE_MS * 0.6);
  }
  // hide hover panel during transition
  reveal.classList.remove("visible", "lingering", "affirm");
  hovered = null;
  hoveredNode = null;
}
function returnToSky() {
  if (viewMode !== "galaxy") return;
  viewMode = "fadeIn";
  modeStartTime = Date.now();
  const backBtn = document.getElementById("back-button");
  if (backBtn) backBtn.classList.remove("show");
  const gt = document.getElementById("galaxy-title");
  if (gt) gt.classList.remove("show");
  reveal.classList.remove("visible", "lingering", "affirm");
  hovered = null;
  hoveredNode = null;
}

// All remembered stars start hidden. The heartbeat will reveal them one at
// a time, in random order, every HEARTBEAT_MS. When the queue is empty,
// brand new earned stars take over the cadence.
state.stars.forEach(s => { s._revealAt = Infinity; });

const revealQueue = state.stars.slice();
for (let i = revealQueue.length - 1; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [revealQueue[i], revealQueue[j]] = [revealQueue[j], revealQueue[i]];
}

// First heartbeat fires HEARTBEAT_MS after the welcome arrives.
let nextHeartbeatAt = SESSION_START + VEIL_MS + HEARTBEAT_MS;

// ---------- canvases ----------------------------------------------------
const cNeb = document.getElementById("nebula");
const cBg  = document.getElementById("stars-bg");
const cFg  = document.getElementById("stars-fg");
const xNeb = cNeb.getContext("2d");
const xBg  = cBg.getContext("2d");
const xFg  = cFg.getContext("2d");

let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [cNeb, cBg, cFg]) {
    c.width  = W * DPR;
    c.height = H * DPR;
    c.style.width  = W + "px";
    c.style.height = H + "px";
  }
  xNeb.setTransform(DPR, 0, 0, DPR, 0, 0);
  xBg.setTransform(DPR, 0, 0, DPR, 0, 0);
  xFg.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawNebula();
  buildBackgroundStars();
}
window.addEventListener("resize", resize);

// ---------- sky background ----------------------------------------------
// Pure black. The earned stars themselves will become the night sky.
function drawNebula() {
  xNeb.fillStyle = "#000000";
  xNeb.fillRect(0, 0, W, H);
}

// ---------- background stars: none ---------------------------------------
// The user's earned constellation IS the night sky. No random parallax
// stars in the background — the sky stays pure black until the first
// earned star arrives.
function buildBackgroundStars() { /* intentionally empty */ }

// ---------- earned stars (the meaningful ones) --------------------------
// state.stars looks like: [{ id, x: 0..1, y: 0..1, born }]
// They're stored normalized so resize doesn't move them.

function placeNewStar(contentId) {
  // Avoid placing too close to existing stars; sample a few candidates.
  let best = null, bestDist = -1;
  for (let i = 0; i < 20; i++) {
    const cx = 0.10 + Math.random() * 0.80;
    const cy = 0.15 + Math.random() * 0.70;
    let minD = Infinity;
    for (const s of state.stars) {
      const dx = (s.x - cx), dy = (s.y - cy);
      const d = dx*dx + dy*dy;
      if (d < minD) minD = d;
    }
    if (minD > bestDist) { bestDist = minD; best = { x: cx, y: cy }; }
  }
  return { id: contentId, x: best.x, y: best.y, born: Date.now(), _revealAt: Date.now() };
}

// Earn the next content item from CONTENT. Called by the heartbeat after
// all remembered stars have already returned. No cooldown check — the
// heartbeat owns the cadence now.
function addNextEarnedStar() {
  const remaining = CONTENT.filter(c => !state.seen.includes(c.id));
  if (remaining.length === 0) return null;

  // light alternation: prefer the kind opposite the last two seen
  const lastTwo = state.seen.slice(-2).map(id => (CONTENT.find(c => c.id === id) || {}).kind);
  let pool = remaining;
  if (lastTwo[0] === lastTwo[1] && lastTwo[0]) {
    const flip = lastTwo[0] === "term" ? "affirm" : "term";
    const alt = remaining.filter(c => c.kind === flip);
    if (alt.length) pool = alt;
  }
  const pick = pool[Math.floor(Math.random() * pool.length)];
  const s = placeNewStar(pick.id);
  state.stars.push(s);
  state.seen.push(pick.id);
  state.lastAdded = Date.now();
  saveState(state);
  return s;
}

// ---------- animation ---------------------------------------------------
let t = 0;
let mouse = { x: W/2, y: H/2, mx: 0, my: 0 };
window.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  // normalized -1..1 for parallax shift
  mouse.mx = (e.clientX / W - 0.5) * 2;
  mouse.my = (e.clientY / H - 0.5) * 2;
});

function drawBackgroundStars() {
  xBg.clearRect(0, 0, W, H);
}

// hit testing for earned stars
let hovered = null;
// hit testing for galaxies (in sky view) and nodes (in galaxy view)
let hoveredGalaxy = null;
let hoveredNode = null;

// As the constellation grows, the camera pulls back: stars get smaller and
// the spread tightens toward center, leaving more breathing room around
// the edges. Below 20 stars the sky stays at its full size.
function crowdScale() {
  const visible = state.stars.filter(s => s._revealAt <= Date.now()).length + sessionStars.length;
  if (visible <= 20) return 1.0;
  return Math.max(0.35, 1 - (visible - 20) * 0.012);
}

function drawForegroundStars() {
  xFg.clearRect(0, 0, W, H);
  // gentle camera drift
  const driftX = Math.sin(t * 0.00005) * 8 - mouse.mx * 10;
  const driftY = Math.cos(t * 0.00007) * 6 - mouse.my * 10;

  const cs = crowdScale();
  const allStars = state.stars.concat(sessionStars);
  for (const s of allStars) {
    if (s._revealAt == null || Date.now() < s._revealAt) {
      s._sx = null;  // hidden — clear hit-test info
      continue;
    }

    const c = s.isWelcome
      ? { kind: "welcome" }
      : CONTENT.find(c => c.id === s.id);
    if (!c) continue;

    // crowd-aware position: shrink toward center as the sky fills
    const x = (s.x - 0.5) * W * cs + W / 2 + driftX;
    const y = (s.y - 0.5) * H * cs + H / 2 + driftY;
    const isHover = hovered && hovered.id === s.id;

    // ---- unified arrival animation ----
    // Every revealed star — remembered or brand new — uses the same zoom-in
    // animation, started at _revealAt. There is no separate "load fade" path
    // anymore; the heartbeat reveals stars one at a time.
    const age = Date.now() - s._revealAt;
    const introT = Math.min(1, age / INTRO_MS);
    const eased = 1 - Math.pow(1 - introT, 3);
    const introScale = 1 + (1 - eased) * 4.0;
    const introBoost = 1 + (1 - eased) * 1.6;
    const flash = age < 350 ? (1 - age / 350) : 0;

    // tint by kind
    let core, halo;
    if (c.kind === "welcome") {
      core = "rgba(255, 240, 210, "; halo = "rgba(245, 220, 160, ";
    } else if (c.kind === "term") {
      core = "rgba(220, 232, 255, "; halo = "rgba(150, 180, 230, ";
    } else {
      core = "rgba(255, 244, 220, "; halo = "rgba(220, 180, 130, ";
    }

    const twinkle = 0.85 + 0.15 * Math.sin(t * 0.0018 + (s.x + s.y) * 12);
    const baseAlpha = twinkle * introBoost;                      // arriving stars are brighter
    const hoverBoost = isHover ? 1.2 : 1.0;
    const r = (c.kind === "welcome" ? 2.6 : 2.0) * hoverBoost * introScale * cs;
    const haloR = 60 * hoverBoost * introScale * cs;

    // outer glow rings
    const ringAlpha = Math.min(1, baseAlpha * (isHover ? 0.55 : 0.32));
    const grad = xFg.createRadialGradient(x, y, 0, x, y, haloR);
    grad.addColorStop(0, halo + (ringAlpha * 0.9) + ")");
    grad.addColorStop(0.25, halo + (ringAlpha * 0.35) + ")");
    grad.addColorStop(1, halo + "0)");
    xFg.fillStyle = grad;
    xFg.beginPath();
    xFg.arc(x, y, haloR, 0, Math.PI * 2);
    xFg.fill();

    // bright core
    xFg.fillStyle = core + Math.min(1, baseAlpha) + ")";
    xFg.beginPath();
    xFg.arc(x, y, r, 0, Math.PI * 2);
    xFg.fill();

    // crisp highlight
    xFg.fillStyle = "rgba(255,255,255," + Math.min(1, baseAlpha * 0.9) + ")";
    xFg.beginPath();
    xFg.arc(x, y, r * 0.45, 0, Math.PI * 2);
    xFg.fill();

    // arrival spark — a brief bright disc on top of the core, only the first ~350ms
    if (flash > 0) {
      const sparkR = 18 + 40 * flash;
      const sg = xFg.createRadialGradient(x, y, 0, x, y, sparkR);
      sg.addColorStop(0, "rgba(255,255,255," + (0.95 * flash) + ")");
      sg.addColorStop(0.4, "rgba(255,255,255," + (0.35 * flash) + ")");
      sg.addColorStop(1, "rgba(255,255,255,0)");
      xFg.fillStyle = sg;
      xFg.beginPath();
      xFg.arc(x, y, sparkR, 0, Math.PI * 2);
      xFg.fill();
    }

    // store screen position back on the object for hit test
    s._sx = x;
    s._sy = y;
  }
}

// ---------- shooting stars ----------------------------------------------
const shootingStars = [];
let nextShootAt = SESSION_START + VEIL_MS + 25 * 1000 + Math.random() * 15000;

function spawnShootingStar() {
  // Start somewhere in the upper portion of the sky; travel down-and-across
  // at a gentle angle. Random direction (left or right).
  const fromLeft = Math.random() < 0.5;
  const angle = (Math.PI / 6) + Math.random() * (Math.PI / 4); // 30..75 deg
  const length = Math.max(W, H) * (0.5 + Math.random() * 0.4);
  const x1 = fromLeft ? -40 + Math.random() * W * 0.4 : W + 40 - Math.random() * W * 0.4;
  const y1 = -20 + Math.random() * H * 0.35;
  const dirX = fromLeft ? Math.cos(angle) : -Math.cos(angle);
  const dirY = Math.sin(angle);
  shootingStars.push({
    x1, y1,
    x2: x1 + dirX * length,
    y2: y1 + dirY * length,
    born: Date.now(),
    duration: 1500 + Math.random() * 700,
  });
}

function drawShootingStars() {
  const now = Date.now();
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const s = shootingStars[i];
    const u = (now - s.born) / s.duration;
    if (u >= 1) { shootingStars.splice(i, 1); continue; }
    const eased = u * u * (3 - 2 * u); // smoothstep
    const hx = s.x1 + (s.x2 - s.x1) * eased;
    const hy = s.y1 + (s.y2 - s.y1) * eased;
    const dx = s.x2 - s.x1;
    const dy = s.y2 - s.y1;
    const len = Math.sqrt(dx*dx + dy*dy);
    const ux = dx / len, uy = dy / len;
    const trailLen = 110;
    const tx = hx - ux * trailLen;
    const ty = hy - uy * trailLen;
    // fade out near the end
    const fade = u < 0.6 ? 1 : Math.max(0, 1 - (u - 0.6) / 0.4);
    const alpha = 0.95 * fade;
    const grad = xFg.createLinearGradient(tx, ty, hx, hy);
    grad.addColorStop(0, "rgba(255,255,255,0)");
    grad.addColorStop(1, `rgba(255,255,255,${alpha})`);
    xFg.strokeStyle = grad;
    xFg.lineWidth = 1.6;
    xFg.lineCap = "round";
    xFg.beginPath();
    xFg.moveTo(tx, ty);
    xFg.lineTo(hx, hy);
    xFg.stroke();
    // bright head
    xFg.fillStyle = `rgba(255,255,255,${alpha})`;
    xFg.beginPath();
    xFg.arc(hx, hy, 1.8, 0, Math.PI * 2);
    xFg.fill();
  }
}

// ---------- galaxies: rendering ----------------------------------------
// A small procedural spiral. Bright core, two arms made of small stars,
// slow rotation. Used both as a tiny element in the sky view and as a
// large centerpiece in the zoomed-in galaxy view.
function drawGalaxy(g, cx, cy, scale, opts) {
  opts = opts || {};
  const alpha = opts.alpha == null ? 1 : opts.alpha;
  const isHover = !!opts.hover;
  const rotation = (t * 0.00005) + (g._rotSeed || 0);

  // bright core: radial gradient
  const coreR = 14 * scale * (isHover ? 1.15 : 1.0);
  const coreGrad = xFg.createRadialGradient(cx, cy, 0, cx, cy, coreR * 4);
  coreGrad.addColorStop(0, g.tint.core + (0.95 * alpha) + ")");
  coreGrad.addColorStop(0.25, g.tint.core + (0.45 * alpha) + ")");
  coreGrad.addColorStop(0.6, g.tint.arm + (0.18 * alpha) + ")");
  coreGrad.addColorStop(1, g.tint.arm + "0)");
  xFg.fillStyle = coreGrad;
  xFg.beginPath();
  xFg.arc(cx, cy, coreR * 4, 0, Math.PI * 2);
  xFg.fill();

  // bright central pip
  xFg.fillStyle = "rgba(255,255,255," + (0.85 * alpha) + ")";
  xFg.beginPath();
  xFg.arc(cx, cy, 1.6 * scale, 0, Math.PI * 2);
  xFg.fill();

  // two spiral arms. Logarithmic spiral: r = a * e^(b*theta). We sample
  // points along it and draw small dots, with a gentle outward thinning.
  const arms = 2;
  const samplesPerArm = Math.floor(60 * Math.min(scale, 2.2));
  const a = 1.6 * scale;
  const b = 0.32;
  for (let arm = 0; arm < arms; arm++) {
    const armOffset = (Math.PI * 2 * arm) / arms;
    for (let i = 1; i < samplesPerArm; i++) {
      const theta = i * 0.16;
      const r = a * Math.exp(b * theta);
      if (r > 90 * scale) break;
      const ang = theta + armOffset + rotation;
      const px = cx + Math.cos(ang) * r;
      const py = cy + Math.sin(ang) * r * 0.55; // flatten a touch
      // brightness fades along the arm
      const armAlpha = Math.max(0.05, 0.85 - i * 0.012) * alpha;
      const dotR = Math.max(0.4, (1.4 - i * 0.012) * scale * 0.5);
      xFg.fillStyle = g.tint.arm + armAlpha + ")";
      xFg.beginPath();
      xFg.arc(px, py, dotR, 0, Math.PI * 2);
      xFg.fill();
    }
  }

  // a thin halo ring on hover, just to telegraph clickability
  if (isHover) {
    xFg.strokeStyle = g.tint.arm + (0.35 * alpha) + ")";
    xFg.lineWidth = 1;
    xFg.beginPath();
    xFg.arc(cx, cy, 60 * scale, 0, Math.PI * 2);
    xFg.stroke();
  }
}

// In the sky view, draw each galaxy small. Skip during fadeIn (we're
// returning to the sky from a galaxy) so the user lands on bare stars.
function drawGalaxiesSky(alpha) {
  if (alpha <= 0) return;
  const cs = crowdScale();
  const driftX = Math.sin(t * 0.00005) * 8 - mouse.mx * 10;
  const driftY = Math.cos(t * 0.00007) * 6 - mouse.my * 10;
  for (const g of galaxies) {
    if (g._revealAt == null || Date.now() < g._revealAt) {
      g._sx = null;
      continue;
    }
    const cx = (g.x - 0.5) * W * cs + W / 2 + driftX;
    const cy = (g.y - 0.5) * H * cs + H / 2 + driftY;

    // arrival animation: same model as stars
    const age = Date.now() - g._revealAt;
    const introT = Math.min(1, age / INTRO_MS);
    const eased = 1 - Math.pow(1 - introT, 3);
    const introScale = 1 + (1 - eased) * 4.0;
    const introAlpha = Math.min(1, 0.4 + eased * 0.6);

    const isHover = hoveredGalaxy && hoveredGalaxy.id === g.id;
    const baseScale = 0.55 * cs * introScale;

    drawGalaxy(g, cx, cy, baseScale, {
      alpha: introAlpha * alpha,
      hover: isHover,
    });

    // small italic label, only on hover
    if (isHover) {
      xFg.font = 'italic 300 16px "Cormorant Garamond", serif';
      xFg.fillStyle = "rgba(220, 232, 255, " + (0.85 * alpha) + ")";
      xFg.textAlign = "center";
      xFg.fillText(g.title, cx, cy + 70 * cs);
      xFg.font = '300 10px "Inter", sans-serif';
      xFg.fillStyle = "rgba(180, 195, 220, " + (0.6 * alpha) + ")";
      xFg.fillText(g.subtitle.toUpperCase(), cx, cy + 86 * cs);
    }

    g._sx = cx;
    g._sy = cy;
    g._sr = 60 * baseScale; // hit radius
  }
}

// Inside the galaxy view: a big central spiral, with the nodes orbiting
// around it as small lights. Hovering a node reveals its content via the
// existing reveal panel.
function drawGalaxyDetail(g, alpha) {
  if (alpha <= 0) return;
  const cx = W / 2 + Math.sin(t * 0.00006) * 8;
  const cy = H / 2 + 30 + Math.cos(t * 0.00008) * 6;

  // the centerpiece spiral, large
  drawGalaxy(g, cx, cy, 3.2, { alpha: alpha });

  // node ring(s). For 10 nodes we put them on a single ellipse around the
  // galaxy core, evenly spaced, with a slow shared rotation.
  const ringRx = Math.min(W, H) * 0.36;
  const ringRy = ringRx * 0.62;
  const ringRot = t * 0.00003;
  const n = g.nodes.length;
  for (let i = 0; i < n; i++) {
    const node = g.nodes[i];
    const ang = (Math.PI * 2 * i) / n + ringRot;
    const nx = cx + Math.cos(ang) * ringRx;
    const ny = cy + Math.sin(ang) * ringRy;

    const isHover = hoveredNode === node;
    const r = (isHover ? 4.2 : 2.8);
    const haloR = isHover ? 70 : 48;

    // halo
    const grad = xFg.createRadialGradient(nx, ny, 0, nx, ny, haloR);
    grad.addColorStop(0, "rgba(220, 232, 255, " + (0.55 * alpha) + ")");
    grad.addColorStop(0.3, "rgba(180, 200, 255, " + (0.20 * alpha) + ")");
    grad.addColorStop(1, "rgba(180, 200, 255, 0)");
    xFg.fillStyle = grad;
    xFg.beginPath();
    xFg.arc(nx, ny, haloR, 0, Math.PI * 2);
    xFg.fill();

    // core
    xFg.fillStyle = "rgba(255, 255, 255, " + (0.95 * alpha) + ")";
    xFg.beginPath();
    xFg.arc(nx, ny, r, 0, Math.PI * 2);
    xFg.fill();

    // label, always visible but gentle
    xFg.font = '300 10px "Inter", sans-serif';
    xFg.fillStyle = isHover
      ? "rgba(232, 240, 255, " + (0.95 * alpha) + ")"
      : "rgba(180, 195, 220, " + (0.55 * alpha) + ")";
    xFg.textAlign = "center";
    // place label outside the ring (radial)
    const lx = cx + Math.cos(ang) * (ringRx + 22);
    const ly = cy + Math.sin(ang) * (ringRy + 22) + 4;
    xFg.fillText(node.label.toUpperCase(), lx, ly);

    node._sx = nx;
    node._sy = ny;
  }

  // soft blurb under the title at the top of the screen
  xFg.font = 'italic 300 14px "Cormorant Garamond", serif';
  xFg.fillStyle = "rgba(180, 195, 220, " + (0.55 * alpha) + ")";
  xFg.textAlign = "center";
  // wrap manually if needed — give it room below the HTML title block
  const blurbY = 156;
  wrapText(xFg, g.blurb, W / 2, blurbY, Math.min(W * 0.7, 720), 18);
}

// quick text wrapper so the blurb can break cleanly under the title
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(" ");
  let line = "";
  let yy = y;
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + " " + words[i] : words[i];
    const w = ctx.measureText(test).width;
    if (w > maxWidth && line) {
      ctx.fillText(line, x, yy);
      line = words[i];
      yy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, yy);
}

function tick(now) {
  t = now || performance.now();
  drawBackgroundStars();
  xFg.clearRect(0, 0, W, H);

  // figure out per-mode alphas based on transition state
  let alphaSky = 0;
  let alphaGalaxy = 0;
  if (viewMode === "sky") {
    alphaSky = 1;
  } else if (viewMode === "galaxy") {
    alphaGalaxy = 1;
  } else if (viewMode === "fadeOut") {
    const u = Math.min(1, (Date.now() - modeStartTime) / FADE_MS);
    alphaSky = 1 - u;
    alphaGalaxy = u;
    if (u >= 1) viewMode = "galaxy";
  } else if (viewMode === "fadeIn") {
    const u = Math.min(1, (Date.now() - modeStartTime) / FADE_MS);
    alphaSky = u;
    alphaGalaxy = 1 - u;
    if (u >= 1) {
      viewMode = "sky";
      activeGalaxy = null;
      thawHeartbeat();
    }
  }

  // sky layer
  if (alphaSky > 0) {
    xFg.save();
    xFg.globalAlpha = alphaSky;
    drawForegroundStarsInline();
    drawGalaxiesSky(1);
    drawShootingStars();
    xFg.restore();
  }
  // galaxy layer
  if (alphaGalaxy > 0 && activeGalaxy) {
    xFg.save();
    xFg.globalAlpha = alphaGalaxy;
    drawGalaxyDetail(activeGalaxy, 1);
    xFg.restore();
  }

  requestAnimationFrame(tick);
}

// drawForegroundStarsInline: same as drawForegroundStars but does not
// clear the canvas (the new tick clears once per frame).
function drawForegroundStarsInline() {
  // Reuse drawForegroundStars but skip its initial clearRect by saving
  // and restoring the canvas state. Easiest: temporarily swap clearRect.
  const origClear = xFg.clearRect.bind(xFg);
  xFg.clearRect = function() { /* no-op for this call */ };
  try {
    drawForegroundStars();
  } finally {
    xFg.clearRect = origClear;
  }
}

// ---------- hover detection on earned stars -----------------------------
const reveal = document.getElementById("reveal");
const revealWord = reveal.querySelector(".word");
const revealDesc = reveal.querySelector(".desc");
let lingerTimer = null;

const revealRfoNote = reveal.querySelector(".rfo-note");
const revealRfoText = reveal.querySelector(".rfo-text");

function showRevealForStar(found, e) {
  reveal.classList.remove("pinned"); // sky-view stars use cursor follow
  if (found.isWelcome) {
    revealWord.textContent = found.welcomeText;
    revealDesc.textContent = "";
    reveal.classList.add("affirm");
  } else {
    const c = CONTENT.find(c => c.id === found.id);
    if (c.kind === "affirm") {
      revealWord.textContent = c.text;
      revealDesc.textContent = "";
      reveal.classList.add("affirm");
    } else {
      revealWord.textContent = c.word;
      revealDesc.textContent = c.desc;
      reveal.classList.remove("affirm");
    }
  }
  if (revealRfoNote) revealRfoNote.style.display = "none";
  reveal.classList.add("visible");
  reveal.classList.remove("lingering");
  clearTimeout(lingerTimer);
  lingerTimer = setTimeout(() => reveal.classList.add("lingering"), 700);
}

function showRevealForNode(node) {
  revealWord.textContent = node.title;
  revealDesc.textContent = node.text;
  reveal.classList.remove("affirm");
  reveal.classList.add("pinned"); // lock to right side, no cursor follow
  // clear any inline left/top from previous cursor-follow positioning
  reveal.style.left = "";
  reveal.style.top = "";
  if (revealRfoNote && node.rfo) {
    revealRfoText.textContent = node.rfo;
    revealRfoNote.style.display = "block";
  } else if (revealRfoNote) {
    revealRfoNote.style.display = "none";
  }
  reveal.classList.add("visible");
  reveal.classList.remove("lingering");
  clearTimeout(lingerTimer);
  lingerTimer = setTimeout(() => reveal.classList.add("lingering"), 700);
}

function clearReveal() {
  reveal.classList.remove("visible", "lingering", "affirm", "pinned");
  clearTimeout(lingerTimer);
}

function positionReveal(e) {
  const pad = 24;
  let rx = e.clientX + 28;
  let ry = e.clientY + 18;
  if (rx + 380 > W) rx = e.clientX - 380 - 24;
  if (ry + 220 > H) ry = e.clientY - 220 - 24;
  if (rx < pad) rx = pad;
  if (ry < pad) ry = pad;
  reveal.style.left = rx + "px";
  reveal.style.top  = ry + "px";
}

cFg.addEventListener("mousemove", (e) => {
  // ---- galaxy view: hit-test the orbiting nodes ----
  if (viewMode === "galaxy" && activeGalaxy) {
    let foundNode = null;
    let bestD = 28 * 28;
    for (const node of activeGalaxy.nodes) {
      if (node._sx == null) continue;
      const dx = e.clientX - node._sx;
      const dy = e.clientY - node._sy;
      const d = dx*dx + dy*dy;
      if (d < bestD) { bestD = d; foundNode = node; }
    }
    if (foundNode && hoveredNode !== foundNode) {
      hoveredNode = foundNode;
      cFg.style.cursor = "pointer";
      showRevealForNode(foundNode);
    } else if (!foundNode && hoveredNode) {
      hoveredNode = null;
      cFg.style.cursor = "default";
      clearReveal();
    }
    // pinned reveal panel — no cursor follow
    return;
  }

  // ---- transitions: don't show new hover UI mid-fade ----
  if (viewMode !== "sky") return;

  // ---- sky view: hit-test stars and galaxies ----
  let found = null;
  let bestD = 32 * 32;
  const allStars = state.stars.concat(sessionStars);
  for (const s of allStars) {
    if (s._sx == null) continue;
    const dx = e.clientX - s._sx;
    const dy = e.clientY - s._sy;
    const d = dx*dx + dy*dy;
    if (d < bestD) { bestD = d; found = s; }
  }

  // galaxy hit-test (use a more generous radius — galaxies are bigger)
  let foundGalaxy = null;
  let bestGD = 64 * 64;
  for (const g of galaxies) {
    if (g._sx == null) continue;
    const dx = e.clientX - g._sx;
    const dy = e.clientY - g._sy;
    const d = dx*dx + dy*dy;
    if (d < bestGD) { bestGD = d; foundGalaxy = g; }
  }
  // a star directly under the cursor wins over the galaxy
  if (found) foundGalaxy = null;

  if (found && (!hovered || hovered.id !== found.id)) {
    hovered = found;
    hoveredGalaxy = null;
    cFg.style.cursor = "default";
    showRevealForStar(found, e);
  } else if (foundGalaxy && (!hoveredGalaxy || hoveredGalaxy.id !== foundGalaxy.id)) {
    hoveredGalaxy = foundGalaxy;
    hovered = null;
    cFg.style.cursor = "pointer";
    clearReveal();
  } else if (!found && !foundGalaxy && (hovered || hoveredGalaxy)) {
    hovered = null;
    hoveredGalaxy = null;
    cFg.style.cursor = "default";
    clearReveal();
  }
  if (hovered) positionReveal(e);
});

// click: enter a galaxy if one is hovered in sky view
cFg.addEventListener("click", (e) => {
  if (viewMode === "sky" && hoveredGalaxy) {
    enterGalaxy(hoveredGalaxy);
  }
});

// ---------- new star note ----------------------------------------------
function showNewStarNote() {
  const note = document.getElementById("newstar-note");
  note.classList.add("show");
  setTimeout(() => note.classList.remove("show"), 4200);
}

// ---------- status: countdown to next light ----------------------------
function fmtRemaining(ms) {
  if (ms <= 0) return "ready";
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  const s = Math.ceil((ms % 60000) / 1000);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}
function tickStatus() {
  const el = document.querySelector("#status .num");
  const stillToReveal = revealQueue.length;
  const stillToEarn = CONTENT.filter(c => !state.seen.includes(c.id)).length;
  if (stillToReveal + stillToEarn === 0) {
    el.textContent = "the sky is full";
    return;
  }
  const wait = nextHeartbeatAt - Date.now();
  el.textContent = wait <= 0 ? "ready" : fmtRemaining(wait);
}

// The heartbeat: every HEARTBEAT_MS, reveal one star. Remembered stars
// (from prior sessions) come back first, in random order; once that queue
// is empty, brand-new earned stars from CONTENT take over the cadence.
let heartbeatFrozen = false;
let freezeStartedAt = 0;

function freezeHeartbeat() {
  if (heartbeatFrozen) return;
  heartbeatFrozen = true;
  freezeStartedAt = Date.now();
}
function thawHeartbeat() {
  if (!heartbeatFrozen) return;
  const elapsed = Date.now() - freezeStartedAt;
  // shift the cadence forward by however long we were frozen
  nextHeartbeatAt += elapsed;
  nextShootAt += elapsed;
  heartbeatFrozen = false;
}

function heartbeatTick() {
  if (heartbeatFrozen) { tickStatus(); return; }
  const now = Date.now();
  if (now >= nextHeartbeatAt) {
    if (revealQueue.length > 0) {
      const s = revealQueue.shift();
      s._revealAt = now;
    } else {
      addNextEarnedStar(); // sets _revealAt = now internally via placeNewStar
    }
    nextHeartbeatAt = now + HEARTBEAT_MS;
  }
  // shooting stars on their own slower cadence
  if (now >= nextShootAt) {
    spawnShootingStar();
    nextShootAt = now + SHOOT_MIN_MS + Math.random() * (SHOOT_MAX_MS - SHOOT_MIN_MS);
  }
  tickStatus();
}
setInterval(heartbeatTick, 500);

// ---------- music --------------------------------------------------------
const PLAYLIST = [
  "audio/starry-night-a.mp3",
  "audio/starry-night-b.mp3",
  "audio/starry-night-2-a.mp3",
  "audio/starry-night-2-b.mp3",
  "audio/study-night-a.mp3",
  "audio/study-night-b.mp3",
];

// Fisher-Yates shuffle so each session has a different order
function shuffled(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const audio = document.getElementById("ambient");
let queue = shuffled(PLAYLIST);
let qIdx = 0;
audio.src = queue[0];
audio.volume = 0.35;

audio.addEventListener("ended", () => {
  qIdx = (qIdx + 1) % queue.length;
  if (qIdx === 0) queue = shuffled(PLAYLIST); // reshuffle each loop
  audio.src = queue[qIdx];
  audio.play().catch(() => {});
});

const musicBtn = document.getElementById("music-toggle");
let musicOn = false;

function setMusicOnUi(on) {
  musicOn = on;
  musicBtn.style.color = on ? "var(--silver)" : "";
  musicBtn.style.borderColor = on ? "var(--silver)" : "";
}

// Try to autoplay the moment the page loads. Most browsers will block this
// because there's been no user gesture yet — in that case, listen for the
// first interaction anywhere on the page and start playback then. From the
// user's perspective, the music starts "automatically" on first contact.
function autoStartMusic() {
  audio.play().then(() => setMusicOnUi(true)).catch(() => {
    const start = () => {
      audio.play().then(() => setMusicOnUi(true)).catch(() => {});
      window.removeEventListener("pointerdown", start);
      window.removeEventListener("keydown", start);
      window.removeEventListener("touchstart", start);
    };
    window.addEventListener("pointerdown", start);
    window.addEventListener("keydown", start);
    window.addEventListener("touchstart", start);
  });
}

musicBtn.addEventListener("click", () => {
  if (musicOn) {
    audio.pause();
    setMusicOnUi(false);
  } else {
    audio.play().then(() => setMusicOnUi(true)).catch(() => {});
  }
});

autoStartMusic();

// back button + escape return to the sky from a galaxy view
document.getElementById("back-button").addEventListener("click", (e) => {
  e.preventDefault();
  returnToSky();
});
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && viewMode === "galaxy") {
    returnToSky();
  }
});

// ---------- boot --------------------------------------------------------
resize();
tickStatus();
requestAnimationFrame(tick);

// fade the veil
setTimeout(() => {
  document.getElementById("veil").classList.add("gone");
  document.getElementById("helper").classList.add("show");
  document.querySelector(".corner-br").classList.add("show");
}, VEIL_MS);
</script>
